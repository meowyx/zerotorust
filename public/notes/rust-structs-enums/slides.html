<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Structs, Enums, and Match · Slides (EP.03)</title>
<!-- "Add to Home Screen" on iPhone launches this chromeless, the practical
     way to get a fullscreen-like deck where iOS blocks the Fullscreen API -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Rust EP.03" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="/icon" />
<style>
:root{
  --ink:#1c1e22; --soft:#43474e; --muted:#888d96; --line:#e3e4e8;
  --rust:#c8542a; --code-bg:#f5f5f4;
  --sans:"Bricolage Grotesque",system-ui,-apple-system,sans-serif;
  --serif:"Instrument Serif",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --stage:#0e0f12; --panel:#16181d; --sline:#26282e; --sink:#e8e6e2; --smuted:#9a9aaa;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--stage);color:var(--sink);font-family:var(--sans);overflow:hidden;}
button{font-family:inherit;}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.progress{flex:none;height:3px;background:#1d1f24;}
.progress > i{display:block;height:100%;background:var(--rust);width:0;transition:width .25s ease;}

.topbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--sink);}
.brand svg{display:block;}
.brand .sep{color:#4a4d55;font-weight:400;}
.brand .ep{font-family:var(--mono);color:var(--rust);font-weight:700;letter-spacing:.08em;}
.hint{font-family:var(--mono);font-size:11px;color:#6b6e76;white-space:nowrap;}
.hint b{color:#9a9aaa;font-weight:700;}

.middle{flex:1;display:flex;min-height:0;min-width:0;}
.viewport{flex:1;display:grid;place-items:center;min-width:0;min-height:0;position:relative;overflow:hidden;}

/* sized in JS to the scaled deck size so grid centering uses the real footprint */
.scaler{position:relative;flex:none;}
.deck{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left;border-radius:14px;overflow:hidden;background:#fff;
  box-shadow:0 30px 90px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.05);cursor:pointer;}
.deck img.full{display:block;width:100%;height:100%;object-fit:contain;background:#fff;}

/* composed: cover */
.cv{width:100%;height:100%;padding:78px 86px;display:flex;flex-direction:column;justify-content:center;position:relative;color:var(--ink);}
.cv-eyebrow{font-family:var(--mono);font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.cv-title{font-size:96px;line-height:1.04;font-weight:800;color:#16181d;margin:18px 0 0;letter-spacing:-0.01em;}
.cv-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.cv-tag{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--soft);margin:26px 0 0;max-width:760px;line-height:1.32;}
.cv-chip{margin-top:40px;align-self:flex-start;font-family:var(--mono);font-size:16px;color:var(--soft);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:8px;}
.cv-foot{position:absolute;left:86px;right:86px;bottom:54px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);padding-top:18px;font-size:15px;color:var(--muted);}
.cv-foot .ep{font-family:var(--mono);font-weight:700;color:var(--rust);letter-spacing:.12em;}
.cv-num{position:absolute;top:54px;right:86px;font-family:var(--mono);font-weight:800;font-size:120px;color:#e6e7ec;line-height:1;}

/* composed: cheatsheet */
.ck{width:100%;height:100%;padding:56px 70px;display:flex;flex-direction:column;color:var(--ink);}
.ck h2{font-size:48px;font-weight:800;color:#16181d;margin:0 0 4px;letter-spacing:-0.01em;}
.ck h2 .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.ck h2 .ck-part{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--muted);letter-spacing:.06em;vertical-align:middle;margin-left:10px;}
.ck .sub{font-size:17px;color:var(--soft);margin:0 0 18px;}
.ck table{width:100%;border-collapse:collapse;font-size:16.5px;}
.ck th{text-align:left;background:#f3f3f4;color:var(--ink);font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;border:1px solid var(--line);}
.ck td{padding:7px 12px;border:1px solid var(--line);color:var(--soft);vertical-align:top;}
.ck td.idea{font-weight:700;color:#16181d;width:38%;}
.ck code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}

/* composed: text card for slides with no still (divider / pull-quote / image-less scene) */
.txt{width:100%;height:100%;padding:64px 78px;display:flex;flex-direction:column;justify-content:center;color:var(--ink);}
.txt-kicker{font-family:var(--mono);font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
.txt-title{font-size:74px;line-height:1.04;font-weight:800;color:#16181d;margin:0;letter-spacing:-0.01em;}
.txt-title.txt-title-sm{font-size:50px;}
.txt-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.txt-lead{font-family:var(--serif);font-style:italic;font-size:30px;line-height:1.4;color:var(--soft);margin:26px 0 0;max-width:880px;}
.txt-points{margin:26px 0 0;padding-left:24px;max-width:900px;}
.txt-points li{font-size:22px;line-height:1.5;color:var(--soft);margin:0 0 12px;}
.txt-points li b{color:var(--ink);font-weight:700;}
.txt code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}
.txt-quote{justify-content:center;}
.txt-quote-text{font-family:var(--serif);font-style:italic;font-size:46px;line-height:1.28;color:#16181d;margin:0;max-width:980px;}

/* notes drawer */
.notes{flex:none;width:0;overflow:hidden;background:var(--panel);border-left:1px solid var(--sline);transition:width .18s ease,height .18s ease;}
.notes.open{width:380px;}
.notes-inner{width:380px;height:100%;overflow:auto;padding:24px 24px 40px;}
.n-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b6e76;margin-bottom:8px;}
.n-title{font-size:23px;font-weight:800;color:var(--sink);margin:0 0 14px;letter-spacing:-0.01em;}
.n-points{margin:0;padding-left:18px;}
.n-points li{font-size:14.5px;line-height:1.6;color:#c4c4cc;margin:0 0 9px;}
.n-points li b{color:#fff;font-weight:700;}
.notes-inner code{font-family:var(--mono);font-size:.86em;background:#22252b;padding:.08em .34em;border-radius:4px;color:#e7a884;}
.n-remember{margin-top:18px;border-left:3px solid var(--rust);background:rgba(200,84,42,.10);border-radius:0 8px 8px 0;padding:12px 14px;font-size:14.5px;line-height:1.55;color:#f0e6df;}
.n-remember span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);font-weight:700;margin-bottom:5px;}
.n-empty{color:#6b6e76;font-size:14px;font-style:italic;}

/* bottom controls */
.controls{flex:none;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--sline);background:#101216;}
.controls .counter{font-family:var(--mono);font-size:13px;color:var(--smuted);min-width:66px;}
.controls .counter b{color:var(--sink);}
.controls .ctitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:#c4c4cc;}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--sline);background:#1a1c22;color:var(--sink);
  font-size:13px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;transition:background .14s,border-color .14s,color .14s;}
.btn:hover{background:#23262d;border-color:#3a3d45;}
.btn:disabled{opacity:.38;cursor:not-allowed;}
.btn.icon{padding:8px 12px;font-size:17px;line-height:1;}
.btn.on{background:rgba(200,84,42,.16);border-color:rgba(200,84,42,.55);color:#f0b69e;}
.btn .k{font-family:var(--mono);font-size:10px;color:#7e818a;}

/* grid overview */
.grid{position:fixed;inset:0;z-index:80;background:rgba(8,9,11,.97);overflow:auto;padding:36px 40px 56px;display:none;}
.grid.open{display:block;}
.grid-head{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto 22px;}
.grid-head h2{font-size:20px;margin:0;color:var(--sink);font-weight:800;}
.grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;max-width:1320px;margin:0 auto;}
.thumb{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;border:1px solid var(--sline);background:#fff;cursor:pointer;transition:transform .12s,outline-color .12s;outline:2px solid transparent;}
.thumb:hover{transform:translateY(-2px);}
.thumb.current{outline-color:var(--rust);}
.thumb img{width:100%;height:100%;object-fit:contain;}
.thumb .composed{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink);padding:10px;text-align:center;}
.thumb .composed .big{font-size:22px;font-weight:800;color:#16181d;}
.thumb .composed .big .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.thumb .num{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:rgba(14,15,18,.78);border-radius:5px;padding:2px 6px;}

@media (max-width:760px){
  .hint{display:none;}
  .controls .ctitle{display:none;}
  .controls{flex-wrap:wrap;gap:8px;padding:8px 10px;}
  .btn{padding:9px 12px;}
  .btn .k{display:none;}            /* no keyboard on touch */
  #btnFull{display:none;}           /* fullscreen is niche on phones, unsupported on iOS */
  /* stack the slide on top and slide notes up from the bottom, so the
     control bar stays reachable instead of being covered by an overlay */
  .middle{flex-direction:column;}
  .notes{width:auto;height:0;border-left:none;border-top:1px solid var(--sline);}
  .notes.open{width:auto;height:46vh;}
  .notes-inner{width:auto;}
}
</style>
</head>

</div>

<script>
(function(){
  "use strict";

  var DATA = {"ep":"03","title":"Structs, Enums, and Match","cover":"\u003cdiv class=\"cv\">\u003cdiv class=\"cv-eyebrow\">MeowyTheDev · Rust from Zero\u003c/div>\u003ch1 class=\"cv-title\">Structs, \u003cspan class=\"accent\">Enums\u003c/span>, and Match\u003c/h1>\u003cp class=\"cv-tag\">structs shape your data. enums give it choices. match reads them back.\u003c/p>\u003cdiv class=\"cv-chip\">The Rust Programming Language \u003cspan class=\"dot\">·\u003c/span> Chapters 5-6\u003c/div>\u003cdiv class=\"cv-foot\">\u003cspan class=\"ep\">EP.03\u003c/span>\u003cspan>companion slides · watch on the Rust from Zero playlist\u003c/span>\u003c/div>\u003cdiv class=\"cv-num\">03\u003c/div>\u003c/div>","coverBig":"Structs, \u003cspan class=\"accent\">Enums\u003c/span>, and Match","cheat":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span> \u003cspan class=\"ck-part\">1 / 2\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Your turn to build\u003c/td>\u003ctd>structs shape it. enums choose it. match reads it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Define a struct\u003c/td>\u003ctd>struct = the shape. instance = a value of that shape.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Why not a tuple?\u003c/td>\u003ctd>tuples are positional. structs are named.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Making and changing one\u003c/td>\u003ctd>fill every field once. shorthand when names match. \u003ccode>..\u003c/code> may move, not copy.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Tuple and unit structs\u003c/td>\u003ctd>\u003ccode>Position(i32, i32)\u003c/code> is a tuple struct. \u003ccode>Spawn\u003c/code> is a unit struct. \u003ccode>Player { ... }\u003c/code> is named.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">One example, three shapes\u003c/td>\u003ctd>raw -&gt; tuple -&gt; struct. each step adds meaning.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Seeing inside: Debug and dbg!\u003c/td>\u003ctd>\u003ccode>derive(Debug)\u003c/code> to see. \u003ccode>dbg!\u003c/code> to trace.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Behavior in impl\u003c/td>\u003ctd>the struct holds the data. impl holds the behavior.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Three flavors of self\u003c/td>\u003ctd>\u003ccode>&amp;self\u003c/code> first. \u003ccode>&amp;mut self\u003c/code> when you write. \u003ccode>self\u003c/code> when you take.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","slides":[{"type":"cover","title":"Structs, Enums, and Match","notes":["\u003cb>Episode 3.\u003c/b> structs shape your data. enums give it choices. match reads them back.","\u003cb>Covers:\u003c/b> The Rust Programming Language · Chapters 5-6"]},{"type":"image","img":"img/SceneTypesHook.webp","kicker":"Book · Ch 5-6 (intro)","title":"Your turn to build","notes":["Ownership keeps your data safe. Now the harder question: how do you shape your data in the first place? So far you have integers, booleans, strings, tuples. They carry values, but none of them can say \u003ccode>Player\u003c/code>, and none can say \u003ccode>Status\u003c/code>. Two tools fix that.","A \u003cb>struct\u003c/b> gives your data a shape, with named fields you choose.","An \u003cb>enum\u003c/b> gives it a set of choices, one of which holds at any time.","\u003cb>Pattern matching\u003c/b> reads them both back, safely, at compile time."],"remember":"structs shape it. enums choose it. match reads it."},{"type":"divider","img":"img/SceneChapter01.webp","kicker":"Chapter · Book · §5.1","title":"Structs","notes":["Chapter break: \u003cb>Structs\u003c/b>.","Define the shape of your data. Structs and enums model everything."]},{"type":"image","img":"img/SceneStructIntro.webp","kicker":"Book · §5.1 Defining Structs","title":"Define a struct","notes":["The \u003ccode>struct\u003c/code> keyword names a new type you define yourself. We&#39;re modeling a game character, so this one is \u003ccode>Player\u003c/code>. Inside the braces are the fields, each with a name and a type.","We used \u003ccode>String\u003c/code>, not \u003ccode>&amp;str\u003c/code>. When the struct \u003cb>owns\u003c/b> its data, the data lives as long as the \u003ccode>Player\u003c/code> does. References inside a struct work too, but they need lifetimes (chapter 10).","The definition is just the \u003cb>shape\u003c/b>, the blueprint. It doesn&#39;t create a player yet.","To get a value, fill the shape in: one \u003ccode>Player\u003c/code>, named \u003ccode>meow\u003c/code>, score 0, alive."],"remember":"struct = the shape. instance = a value of that shape."},{"type":"image","img":"img/SceneStructVsTuple.webp","kicker":"Book · §5.1 Defining Structs","title":"Why not a tuple?","notes":["You could model a player with a tuple. The data fits, but what does each piece mean?","A struct names each piece:","Same three values, same memory. But now anyone reading the code can tell what each piece represents.","The compiler reads those names too. Misspell a field and you get a compile error before the bug ships:","Two or three obviously-related values, a tuple is fine. Beyond that, give the pieces names."],"remember":"tuples are positional. structs are named."},{"type":"image","img":"img/SceneStructInstance.webp","kicker":"Book · §5.1 Defining Structs","title":"Making and changing one","notes":["Fill \u003cb>every field\u003c/b> once. Order is up to you. Read a field with a dot.","To change a field, the \u003cb>whole \u003ccode>let\u003c/code>\u003c/b> has to be \u003ccode>mut\u003c/code>. Rust has no per-field opt-in: the whole instance is mutable, or none of it is.","Field shorthand when a local already has the field&#39;s name, and update syntax to take the rest from another value:","\u003cb>Catch:\u003c/b> \u003ccode>..meow\u003c/code> \u003cem>moves\u003c/em> the non-\u003ccode>Copy\u003c/code> fields out. \u003ccode>name\u003c/code> is a \u003ccode>String\u003c/code>, so after this \u003ccode>meow.name\u003c/code> is gone."],"remember":"fill every field once. shorthand when names match. \u003ccode>..\u003c/code> may move, not copy."},{"type":"image","img":"img/SceneTupleAndUnitStructs.webp","kicker":"Book · §5.1 Defining Structs","title":"Tuple and unit structs","notes":["Two more struct shapes:","\u003cb>Tuple struct:\u003c/b> fields by position, reached with \u003ccode>.0\u003c/code>, \u003ccode>.1\u003c/code>, but with a real type name.","\u003cb>Same shape, different identity.\u003c/b> \u003ccode>Inches\u003c/code> and \u003ccode>Centimeters\u003c/code> both wrap a \u003ccode>u32\u003c/code>, but the compiler treats them as different types.","\u003cb>Unit struct:\u003c/b> no fields, just a name. Useful as a marker type (you&#39;ll see why in episode 06)."],"remember":"\u003ccode>Position(i32, i32)\u003c/code> is a tuple struct. \u003ccode>Spawn\u003c/code> is a unit struct. \u003ccode>Player { ... }\u003c/code> is named."},{"type":"image","img":"img/SceneAreaProgression.webp","kicker":"Book · §5.2 Example Program","title":"One example, three shapes","notes":["The area of a rectangle, refactored twice. Same answer (\u003ccode>1500\u003c/code>) each time, clearer intent each step:","\u003cb>Raw params:\u003c/b> two free-floating numbers. The caller has to remember the order.","\u003cb>Tuple:\u003c/b> grouped, but \u003ccode>.0\u003c/code> and \u003ccode>.1\u003c/code> carry no meaning.","\u003cb>Struct:\u003c/b> named fields. \u003ccode>rect.width * rect.height\u003c/code> reads like prose. The intent lives in the code."],"remember":"raw -&gt; tuple -&gt; struct. each step adds meaning."},{"type":"image","img":"img/SceneDebugAndDbg.webp","kicker":"Book · §5.2 Derived Traits","title":"Seeing inside: Debug and dbg!","notes":["Want to print a struct? \u003ccode>println!(&quot;{}&quot;, r)\u003c/code> won&#39;t compile: \u003ccode>Rectangle\u003c/code> doesn&#39;t implement \u003ccode>Display\u003c/code>, and Rust won&#39;t write it for you. The debug formatter \u003ccode>{:?}\u003c/code> needs opting in too:","\u003cb>\u003ccode>Display\u003c/code> (\u003ccode>{}\u003c/code>)\u003c/b> is for end users. You write it yourself.","\u003cb>\u003ccode>Debug\u003c/code> (\u003ccode>{:?}\u003c/code>)\u003c/b> is the developer formatter. One \u003ccode>#[derive(Debug)]\u003c/code> and the compiler generates it. \u003ccode>{:#?}\u003c/code> pretty-prints.","\u003cb>\u003ccode>dbg!\u003c/code>\u003c/b> prints the expression \u003cem>and\u003c/em> the value, and hands the value back, so it slots into any line."],"remember":"\u003ccode>derive(Debug)\u003c/code> to see. \u003ccode>dbg!\u003c/code> to trace."},{"type":"divider","img":"img/SceneChapter02.webp","kicker":"Chapter · Book · §5.3","title":"Methods","notes":["Chapter break: \u003cb>Methods\u003c/b>.","Behavior lives in impl blocks. Data is what, impl is how."]},{"type":"image","img":"img/SceneImplBlock.webp","kicker":"Book · §5.3 Method Syntax","title":"Behavior in impl","notes":["Data lives in the struct. Behavior lives in an \u003ccode>impl\u003c/code> block.","\u003cb>\u003ccode>describe(&amp;self)\u003c/code>\u003c/b> borrows the player and reads its fields. \u003ccode>&amp;self\u003c/code> is shorthand for \u003ccode>self: &amp;Self\u003c/code>.","At the call site you write \u003ccode>meow.describe()\u003c/code>, not \u003ccode>(&amp;meow).describe()\u003c/code>. Rust adds the reference for you.","\u003cb>\u003ccode>new\u003c/code>\u003c/b> has no \u003ccode>self\u003c/code>. It builds a player and hands it back, so you call it on the type: \u003ccode>Player::new(...)\u003c/code>. That&#39;s an \u003cb>associated function\u003c/b>, where constructors live."],"remember":"the struct holds the data. impl holds the behavior."},{"type":"image","img":"img/SceneSelfFlavors.webp","kicker":"Book · §5.3 Method Syntax","title":"Three flavors of self","notes":["Every method asks: what does it need from the player? That answer picks the \u003ccode>self\u003c/code>:","Start with \u003ccode>&amp;self\u003c/code>. Promote to \u003ccode>&amp;mut self\u003c/code> when you need to write. Use plain \u003ccode>self\u003c/code> only when you mean to consume (converting types, or a builder chain like \u003ccode>Player::new(&quot;Meow&quot;).set_score(0).alive()\u003c/code>)."],"remember":"\u003ccode>&amp;self\u003c/code> first. \u003ccode>&amp;mut self\u003c/code> when you write. \u003ccode>self\u003c/code> when you take."},{"type":"image","img":"img/SceneMethodParams.webp","kicker":"Book · §5.3 Method Syntax","title":"Methods take more than self","notes":["\u003ccode>self\u003c/code> is always the first parameter. After that, methods look like any other function.","At the call site, Rust auto-references \u003ccode>meow\u003c/code>, but the second player you reference yourself with \u003ccode>&amp;other\u003c/code>, because it&#39;s a normal argument, not the \u003ccode>self\u003c/code>.","You can split methods across \u003cb>multiple \u003ccode>impl\u003c/code> blocks\u003c/b> for the same type. The compiler treats them as one. Handy for grouping by purpose."],"remember":"self goes first. more params are normal. one type, many impls."},{"type":"divider","img":"img/SceneChapter03.webp","kicker":"Chapter · Book · §6.1","title":"Enums","notes":["Chapter break: \u003cb>Enums\u003c/b>.","One type, a set of choices. One type, many shapes."]},{"type":"image","img":"img/SceneEnumIntro.webp","kicker":"Book · §6.1 Defining an Enum","title":"Enums carry data","notes":["An enum is a type that is one of a fixed set of options:","A player&#39;s status is \u003cb>exactly one\u003c/b> of these at a time. Never two.","If you tried this with booleans (\u003ccode>is_playing\u003c/code>, \u003ccode>is_paused\u003c/code>, \u003ccode>is_hit\u003c/code>, \u003ccode>is_game_over\u003c/code>), nothing would stop two being \u003ccode>true\u003c/code> at once. The enum makes that impossible.","Rust enums aren&#39;t just tags. \u003ccode>HitBy\u003c/code> carries a number (points lost), \u003ccode>GameOver\u003c/code> carries a named field (who ended it). The data rides inside the variant."],"remember":"one type, many shapes. match handles each."},{"type":"image","img":"img/SceneEnumVariants.webp","kicker":"Book · §6.1 Defining an Enum","title":"Three variant shapes","notes":["\u003cb>Unit variant:\u003c/b> the name on its own, no data. Closest to a C-style enum.","\u003cb>Tuple variant:\u003c/b> values in parens. The data is part of the variant.","\u003cb>Struct variant:\u003c/b> named fields, like a tiny struct living inside one arm.","Three different shapes, one type for the compiler. That&#39;s what makes enums powerful."],"remember":"unit. tuple. struct. three shapes, one type."},{"type":"image","img":"img/SceneOption.webp","kicker":"Book · §6.1 Option","title":"No null, just Option","notes":["In many languages, any reference might secretly be null, and you find out at runtime, sometimes in production. Rust has no null. If a value might be missing, the type says so:","\u003ccode>Option&lt;T&gt;\u003c/code> is \u003ccode>Some(T)\u003c/code> or \u003ccode>None\u003c/code>. You always know up front, from the type, whether something can be missing.","You can&#39;t use an \u003ccode>Option&lt;i32&gt;\u003c/code> as an \u003ccode>i32\u003c/code>. Add one to it and the compiler stops you:","To get the value out, you handle \u003cb>both\u003c/b> cases. The compiler won&#39;t let you skip \u003ccode>None\u003c/code>."],"remember":"the billion-dollar mistake, opted out at the type level."},{"type":"divider","img":"img/SceneChapter04.webp","kicker":"Chapter · Book · §6.2","title":"Pattern matching","notes":["Chapter break: \u003cb>Pattern matching\u003c/b>.","Read every shape, exhaustively. Branch and unpack in one move."]},{"type":"image","img":"img/SceneMatch.webp","kicker":"Book · §6.2 The match Construct","title":"Read it with match","notes":["A struct can hold an enum, and \u003ccode>match\u003c/code> reads it back:","One arm per variant. Rust tests \u003cb>top to bottom\u003c/b>, the first that fits runs.","\u003ccode>match\u003c/code> is an \u003cb>expression\u003c/b>: every arm returns a value, and the whole \u003ccode>match\u003c/code> returns one. You can assign it with \u003ccode>let\u003c/code>.","Patterns can bind the variant&#39;s data (next scene)."],"remember":"match = branch + value in one expression."},{"type":"image","img":"img/SceneMatchBindsValues.webp","kicker":"Book · §6.2 The match Construct","title":"Patterns bind values","notes":["In \u003ccode>Some(i)\u003c/code>, the \u003ccode>i\u003c/code> is a name. It binds to whatever number is inside the \u003ccode>Some\u003c/code>.","Call \u003ccode>plus_one(Some(5))\u003c/code>: the \u003ccode>None\u003c/code> arm doesn&#39;t fit, \u003ccode>Some(i)\u003c/code> does with \u003ccode>i = 5\u003c/code>, returns \u003ccode>Some(6)\u003c/code>.","Call \u003ccode>plus_one(None)\u003c/code>: the \u003ccode>None\u003c/code> arm fits, \u003ccode>Some(i)\u003c/code> is never looked at, returns \u003ccode>None\u003c/code>."],"remember":"arms test the shape, and bind the data inside."},{"type":"image","img":"img/SceneMatchExhaustive.webp","kicker":"Book · §6.2 The match Construct","title":"Match must be exhaustive","notes":["Forget a case and Rust won&#39;t build it:","The compiler even names the variant you missed. Add a new variant later, and every match on that type breaks until you handle it, on purpose.","When you don&#39;t want every case, catch the rest:","\u003cb>\u003ccode>other\u003c/code>\u003c/b> (a name) binds whatever didn&#39;t match above.","\u003cb>\u003ccode>_\u003c/code>\u003c/b> is the catch-all that drops the value, no binding, no warning."],"remember":"exhaustive by default. \u003ccode>other\u003c/code> to keep, \u003ccode>_\u003c/code> to drop."},{"type":"image","img":"img/SceneIfLetWhileLet.webp","kicker":"Book · §6.3 Concise Control Flow","title":"if let and while let","notes":["Sometimes you only care about one variant. A full \u003ccode>match\u003c/code> is noisy for that.","\u003cb>\u003ccode>if let\u003c/code>\u003c/b> runs the block only when the pattern fits, and binds the data. It&#39;s a \u003ccode>match\u003c/code> trimmed to one arm. Add \u003ccode>else\u003c/code> for a fallback.","\u003cb>\u003ccode>while let\u003c/code>\u003c/b> loops as long as the pattern keeps fitting. The moment \u003ccode>pop()\u003c/code> returns \u003ccode>None\u003c/code>, the loop ends."],"remember":"one case? if let. a stream? while let."},{"type":"divider","img":"img/SceneChapter05.webp","kicker":"Chapter · Book · §5.2","title":"Derive","notes":["Chapter break: \u003cb>Derive\u003c/b>.","Free behavior, when you ask."]},{"type":"image","img":"img/SceneDeriveMacros.webp","kicker":"Book · §5.2 Derived Traits","title":"The rest of derive","notes":["One line above a struct asks the compiler to write code for you:","\u003cb>\u003ccode>Clone\u003c/code>\u003c/b> is the explicit deep copy: \u003ccode>.clone()\u003c/code>. Never silent, you typed the word.","\u003cb>\u003ccode>Copy\u003c/code>\u003c/b> is implicit and bitwise, only allowed if \u003cb>every field is \u003ccode>Copy\u003c/code>\u003c/b> (a \u003ccode>String\u003c/code> or \u003ccode>Vec\u003c/code> rules it out). \u003ccode>let b = a\u003c/code> copies and leaves \u003ccode>a\u003c/code> usable.","\u003cb>\u003ccode>PartialEq\u003c/code>\u003c/b> gives you \u003ccode>==\u003c/code> and \u003ccode>!=\u003c/code>, compared field by field.","\u003cb>\u003ccode>Default\u003c/code>\u003c/b> gives \u003ccode>PlayerStats::default()\u003c/code>, every field at its zero state."],"remember":"derive = behavior, for free, when you ask."},{"type":"quote","img":"img/ScenePullQuote.webp","kicker":"Takeaway","title":"The big idea","notes":["The whole episode in three ideas:","A struct is the shape. An enum is the choices. Match is how you read them back."]},{"type":"cheatsheet","title":"Cheatsheet recap (1/2)","notes":["Recap: one line per idea, in order. Good place to pause for questions.","\u003cb>Maps to:\u003c/b> The Rust Programming Language, Chapters 5-6.","\u003cb>Practice:\u003c/b> Rustlings \u003ccode>07_structs\u003c/code>, \u003ccode>08_enums\u003c/code>, \u003ccode>12_options\u003c/code>."],"composed":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span> \u003cspan class=\"ck-part\">1 / 2\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Your turn to build\u003c/td>\u003ctd>structs shape it. enums choose it. match reads it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Define a struct\u003c/td>\u003ctd>struct = the shape. instance = a value of that shape.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Why not a tuple?\u003c/td>\u003ctd>tuples are positional. structs are named.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Making and changing one\u003c/td>\u003ctd>fill every field once. shorthand when names match. \u003ccode>..\u003c/code> may move, not copy.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Tuple and unit structs\u003c/td>\u003ctd>\u003ccode>Position(i32, i32)\u003c/code> is a tuple struct. \u003ccode>Spawn\u003c/code> is a unit struct. \u003ccode>Player { ... }\u003c/code> is named.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">One example, three shapes\u003c/td>\u003ctd>raw -&gt; tuple -&gt; struct. each step adds meaning.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Seeing inside: Debug and dbg!\u003c/td>\u003ctd>\u003ccode>derive(Debug)\u003c/code> to see. \u003ccode>dbg!\u003c/code> to trace.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Behavior in impl\u003c/td>\u003ctd>the struct holds the data. impl holds the behavior.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Three flavors of self\u003c/td>\u003ctd>\u003ccode>&amp;self\u003c/code> first. \u003ccode>&amp;mut self\u003c/code> when you write. \u003ccode>self\u003c/code> when you take.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>"},{"type":"cheatsheet","title":"Cheatsheet recap (2/2)","notes":["Recap, continued."],"composed":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span> \u003cspan class=\"ck-part\">2 / 2\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Methods take more than self\u003c/td>\u003ctd>self goes first. more params are normal. one type, many impls.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Enums carry data\u003c/td>\u003ctd>one type, many shapes. match handles each.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Three variant shapes\u003c/td>\u003ctd>unit. tuple. struct. three shapes, one type.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">No null, just Option\u003c/td>\u003ctd>the billion-dollar mistake, opted out at the type level.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Read it with match\u003c/td>\u003ctd>match = branch + value in one expression.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Patterns bind values\u003c/td>\u003ctd>arms test the shape, and bind the data inside.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Match must be exhaustive\u003c/td>\u003ctd>exhaustive by default. \u003ccode>other\u003c/code> to keep, \u003ccode>_\u003c/code> to drop.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">if let and while let\u003c/td>\u003ctd>one case? if let. a stream? while let.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">The rest of derive\u003c/td>\u003ctd>derive = behavior, for free, when you ask.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>"}]};
  var SLIDES = DATA.slides;
  function stripT(s){ return (s || '').replace(/<[^>]+>/g, ''); }

  // ---- element refs ----
  var deck = document.getElementById('deck');
  var scaler = document.getElementById('scaler');
  var viewport = document.getElementById('viewport');
  var bar = document.getElementById('bar');
  var curEl = document.getElementById('cur');
  var totalEl = document.getElementById('total');
  var ctitle = document.getElementById('ctitle');
  var notes = document.getElementById('notes');
  var notesInner = document.getElementById('notesInner');
  var grid = document.getElementById('grid');
  var gridInner = document.getElementById('gridInner');
  var btnNotes = document.getElementById('btnNotes');
  var btnGrid = document.getElementById('btnGrid');
  var btnFull = document.getElementById('btnFull');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  var NOTES_KEY = 'rfz_slides_notes';
  var idx = 0;
  var notesOpen = false;
  try { notesOpen = localStorage.getItem(NOTES_KEY) === '1'; } catch(e){}

  totalEl.textContent = SLIDES.length;

  function bodyHTML(s){
    if (s.type === 'cover') return DATA.cover;
    if (s.type === 'cheatsheet') return s.composed || DATA.cheat;
    if (s.composed) return s.composed;
    return '<img class="full" src="' + s.img + '" alt="' + stripT(s.title) + '" />';
  }

  function notesHTML(s){
    var pts = (s.notes || []).map(function(n){ return '<li>' + n + '</li>'; }).join('');
    var html = '';
    if (s.kicker) html += '<div class="n-kicker">' + s.kicker + '</div>';
    html += '<h2 class="n-title">' + (s.title || '') + '</h2>';
    if (pts) html += '<ul class="n-points">' + pts + '</ul>';
    else html += '<p class="n-empty">No notes for this slide.</p>';
    if (s.remember) html += '<div class="n-remember"><span>Remember</span>' + s.remember + '</div>';
    return html;
  }

  function fit(){
    var availW = viewport.clientWidth;
    var availH = viewport.clientHeight;
    var scale = Math.min(availW / 1280, availH / 720) * 0.955;
    if (!isFinite(scale) || scale <= 0) scale = 0.1;
    deck.style.transform = 'scale(' + scale + ')';
    scaler.style.width = (1280 * scale) + 'px';
    scaler.style.height = (720 * scale) + 'px';
  }

  function render(){
    var s = SLIDES[idx];
    deck.innerHTML = bodyHTML(s);
    notesInner.innerHTML = notesHTML(s);
    curEl.textContent = (idx + 1);
    ctitle.innerHTML = s.title || '';
    bar.style.width = (((idx + 1) / SLIDES.length) * 100) + '%';
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === SLIDES.length - 1);
    var hash = '#' + (idx + 1);
    if (location.hash !== hash) {
      try { history.replaceState(null, '', hash); } catch(e){ location.hash = hash; }
    }
    updateGridCurrent();
    fit();
  }

  function go(n){
    var t = Math.max(0, Math.min(SLIDES.length - 1, n));
    if (t === idx) return;
    idx = t;
    render();
  }
  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  function setNotes(open){
    notesOpen = open;
    notes.classList.toggle('open', open);
    btnNotes.classList.toggle('on', open);
    try { localStorage.setItem(NOTES_KEY, open ? '1' : '0'); } catch(e){}
    setTimeout(fit, 200);
  }
  function toggleNotes(){ setNotes(!notesOpen); }

  function setGrid(open){
    grid.classList.toggle('open', open);
    btnGrid.classList.toggle('on', open);
    if (open) updateGridCurrent();
  }
  function toggleGrid(){ setGrid(!grid.classList.contains('open')); }

  function updateGridCurrent(){
    var kids = gridInner.children;
    for (var i = 0; i < kids.length; i++){
      kids[i].classList.toggle('current', i === idx);
    }
  }

  function buildGrid(){
    var html = '';
    for (var i = 0; i < SLIDES.length; i++){
      var s = SLIDES[i];
      var inner;
      if (s.type === 'cover') inner = '<div class="composed"><div class="big">' + DATA.coverBig + '</div></div>';
      else if (s.type === 'cheatsheet') inner = '<div class="composed"><div class="big">Cheatsheet <span class="accent">recap</span></div></div>';
      else if (s.composed) inner = '<div class="composed"><div class="big">' + (s.title || '') + '</div></div>';
      else inner = '<img src="' + s.img + '" alt="" loading="lazy" />';
      html += '<div class="thumb" data-i="' + i + '" title="' + stripT(s.title) + '">' + inner + '<span class="num">' + (i + 1) + '</span></div>';
    }
    gridInner.innerHTML = html;
  }

  function toggleFull(){
    var el = document.documentElement;
    if (!document.fullscreenElement){
      (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }

  // ---- events ----
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  btnNotes.addEventListener('click', toggleNotes);
  btnGrid.addEventListener('click', toggleGrid);
  btnFull.addEventListener('click', toggleFull);
  document.getElementById('gridClose').addEventListener('click', function(){ setGrid(false); });

  deck.addEventListener('click', next);

  gridInner.addEventListener('click', function(e){
    var t = e.target.closest('.thumb');
    if (!t) return;
    go(parseInt(t.getAttribute('data-i'), 10));
    setGrid(false);
  });

  document.addEventListener('keydown', function(e){
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key;
    if (k === 'ArrowRight' || k === 'PageDown' || k === ' ' || k === 'Spacebar'){ e.preventDefault(); next(); }
    else if (k === 'ArrowLeft' || k === 'PageUp'){ e.preventDefault(); prev(); }
    else if (k === 'Home'){ e.preventDefault(); go(0); }
    else if (k === 'End'){ e.preventDefault(); go(SLIDES.length - 1); }
    else if (k === 'n' || k === 'N'){ toggleNotes(); }
    else if (k === 'g' || k === 'G'){ toggleGrid(); }
    else if (k === 'f' || k === 'F'){ toggleFull(); }
    else if (k === 'Escape'){ if (grid.classList.contains('open')) setGrid(false); }
  });

  // basic swipe
  var sx = null;
  viewport.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
  viewport.addEventListener('touchend', function(e){
    if (sx === null) return;
    var dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    sx = null;
  }, {passive:true});

  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', function(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n) && (n - 1) !== idx) go(n - 1);
  });

  // ---- init ----
  (function start(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n)) idx = Math.max(0, Math.min(SLIDES.length - 1, n - 1));
    buildGrid();
    setNotes(notesOpen);
    render();
  })();
})();
</script>
</body>
</html>
