<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Modules and Cargo · Slides (EP.08)</title>
<!-- "Add to Home Screen" on iPhone launches this chromeless, the practical
     way to get a fullscreen-like deck where iOS blocks the Fullscreen API -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Rust EP.08" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="/icon" />
<style>
:root{
  --ink:#1c1e22; --soft:#43474e; --muted:#888d96; --line:#e3e4e8;
  --rust:#c8542a; --code-bg:#f5f5f4;
  --sans:"Bricolage Grotesque",system-ui,-apple-system,sans-serif;
  --serif:"Instrument Serif",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --stage:#0e0f12; --panel:#16181d; --sline:#26282e; --sink:#e8e6e2; --smuted:#9a9aaa;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--stage);color:var(--sink);font-family:var(--sans);overflow:hidden;}
button{font-family:inherit;}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.progress{flex:none;height:3px;background:#1d1f24;}
.progress > i{display:block;height:100%;background:var(--rust);width:0;transition:width .25s ease;}

.topbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--sink);}
.brand svg{display:block;}
.brand .sep{color:#4a4d55;font-weight:400;}
.brand .ep{font-family:var(--mono);color:var(--rust);font-weight:700;letter-spacing:.08em;}
.hint{font-family:var(--mono);font-size:11px;color:#6b6e76;white-space:nowrap;}
.hint b{color:#9a9aaa;font-weight:700;}

.middle{flex:1;display:flex;min-height:0;min-width:0;}
.viewport{flex:1;display:grid;place-items:center;min-width:0;min-height:0;position:relative;overflow:hidden;}

/* sized in JS to the scaled deck size so grid centering uses the real footprint */
.scaler{position:relative;flex:none;}
.deck{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left;border-radius:14px;overflow:hidden;background:#fff;
  box-shadow:0 30px 90px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.05);cursor:pointer;}
.deck img.full{display:block;width:100%;height:100%;object-fit:contain;background:#fff;}

/* composed: cover */
.cv{width:100%;height:100%;padding:78px 86px;display:flex;flex-direction:column;justify-content:center;position:relative;color:var(--ink);}
.cv-eyebrow{font-family:var(--mono);font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.cv-title{font-size:96px;line-height:1.04;font-weight:800;color:#16181d;margin:18px 0 0;letter-spacing:-0.01em;}
.cv-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.cv-tag{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--soft);margin:26px 0 0;max-width:760px;line-height:1.32;}
.cv-chip{margin-top:40px;align-self:flex-start;font-family:var(--mono);font-size:16px;color:var(--soft);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:8px;}
.cv-foot{position:absolute;left:86px;right:86px;bottom:54px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);padding-top:18px;font-size:15px;color:var(--muted);}
.cv-foot .ep{font-family:var(--mono);font-weight:700;color:var(--rust);letter-spacing:.12em;}
.cv-num{position:absolute;top:54px;right:86px;font-family:var(--mono);font-weight:800;font-size:120px;color:#e6e7ec;line-height:1;}

/* composed: cheatsheet */
.ck{width:100%;height:100%;padding:56px 70px;display:flex;flex-direction:column;color:var(--ink);}
.ck h2{font-size:48px;font-weight:800;color:#16181d;margin:0 0 4px;letter-spacing:-0.01em;}
.ck h2 .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.ck .sub{font-size:17px;color:var(--soft);margin:0 0 18px;}
.ck table{width:100%;border-collapse:collapse;font-size:16.5px;}
.ck th{text-align:left;background:#f3f3f4;color:var(--ink);font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;border:1px solid var(--line);}
.ck td{padding:7px 12px;border:1px solid var(--line);color:var(--soft);vertical-align:top;}
.ck td.idea{font-weight:700;color:#16181d;width:38%;}
.ck code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}

/* composed: text card for slides with no still (divider / pull-quote / image-less scene) */
.txt{width:100%;height:100%;padding:64px 78px;display:flex;flex-direction:column;justify-content:center;color:var(--ink);}
.txt-kicker{font-family:var(--mono);font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
.txt-title{font-size:74px;line-height:1.04;font-weight:800;color:#16181d;margin:0;letter-spacing:-0.01em;}
.txt-title.txt-title-sm{font-size:50px;}
.txt-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.txt-lead{font-family:var(--serif);font-style:italic;font-size:30px;line-height:1.4;color:var(--soft);margin:26px 0 0;max-width:880px;}
.txt-points{margin:26px 0 0;padding-left:24px;max-width:900px;}
.txt-points li{font-size:22px;line-height:1.5;color:var(--soft);margin:0 0 12px;}
.txt-points li b{color:var(--ink);font-weight:700;}
.txt code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}
.txt-quote{justify-content:center;}
.txt-quote-text{font-family:var(--serif);font-style:italic;font-size:46px;line-height:1.28;color:#16181d;margin:0;max-width:980px;}

/* notes drawer */
.notes{flex:none;width:0;overflow:hidden;background:var(--panel);border-left:1px solid var(--sline);transition:width .18s ease,height .18s ease;}
.notes.open{width:380px;}
.notes-inner{width:380px;height:100%;overflow:auto;padding:24px 24px 40px;}
.n-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b6e76;margin-bottom:8px;}
.n-title{font-size:23px;font-weight:800;color:var(--sink);margin:0 0 14px;letter-spacing:-0.01em;}
.n-points{margin:0;padding-left:18px;}
.n-points li{font-size:14.5px;line-height:1.6;color:#c4c4cc;margin:0 0 9px;}
.n-points li b{color:#fff;font-weight:700;}
.notes-inner code{font-family:var(--mono);font-size:.86em;background:#22252b;padding:.08em .34em;border-radius:4px;color:#e7a884;}
.n-remember{margin-top:18px;border-left:3px solid var(--rust);background:rgba(200,84,42,.10);border-radius:0 8px 8px 0;padding:12px 14px;font-size:14.5px;line-height:1.55;color:#f0e6df;}
.n-remember span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);font-weight:700;margin-bottom:5px;}
.n-empty{color:#6b6e76;font-size:14px;font-style:italic;}

/* bottom controls */
.controls{flex:none;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--sline);background:#101216;}
.controls .counter{font-family:var(--mono);font-size:13px;color:var(--smuted);min-width:66px;}
.controls .counter b{color:var(--sink);}
.controls .ctitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:#c4c4cc;}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--sline);background:#1a1c22;color:var(--sink);
  font-size:13px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;transition:background .14s,border-color .14s,color .14s;}
.btn:hover{background:#23262d;border-color:#3a3d45;}
.btn:disabled{opacity:.38;cursor:not-allowed;}
.btn.icon{padding:8px 12px;font-size:17px;line-height:1;}
.btn.on{background:rgba(200,84,42,.16);border-color:rgba(200,84,42,.55);color:#f0b69e;}
.btn .k{font-family:var(--mono);font-size:10px;color:#7e818a;}

/* grid overview */
.grid{position:fixed;inset:0;z-index:80;background:rgba(8,9,11,.97);overflow:auto;padding:36px 40px 56px;display:none;}
.grid.open{display:block;}
.grid-head{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto 22px;}
.grid-head h2{font-size:20px;margin:0;color:var(--sink);font-weight:800;}
.grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;max-width:1320px;margin:0 auto;}
.thumb{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;border:1px solid var(--sline);background:#fff;cursor:pointer;transition:transform .12s,outline-color .12s;outline:2px solid transparent;}
.thumb:hover{transform:translateY(-2px);}
.thumb.current{outline-color:var(--rust);}
.thumb img{width:100%;height:100%;object-fit:contain;}
.thumb .composed{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink);padding:10px;text-align:center;}
.thumb .composed .big{font-size:22px;font-weight:800;color:#16181d;}
.thumb .composed .big .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.thumb .num{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:rgba(14,15,18,.78);border-radius:5px;padding:2px 6px;}

@media (max-width:760px){
  .hint{display:none;}
  .controls .ctitle{display:none;}
  .controls{flex-wrap:wrap;gap:8px;padding:8px 10px;}
  .btn{padding:9px 12px;}
  .btn .k{display:none;}            /* no keyboard on touch */
  #btnFull{display:none;}           /* fullscreen is niche on phones, unsupported on iOS */
  /* stack the slide on top and slide notes up from the bottom, so the
     control bar stays reachable instead of being covered by an overlay */
  .middle{flex-direction:column;}
  .notes{width:auto;height:0;border-left:none;border-top:1px solid var(--sline);}
  .notes.open{width:auto;height:46vh;}
  .notes-inner{width:auto;}
}
</style>
</head>

<script>
(function(){
  "use strict";

  var DATA = {"ep":"08","title":"Modules and Cargo","cover":"\u003cdiv class=\"cv\">\u003cdiv class=\"cv-eyebrow\">MeowyTheDev · Rust from Zero\u003c/div>\u003ch1 class=\"cv-title\">Modules and \u003cspan class=\"accent\">Cargo\u003c/span>\u003c/h1>\u003cp class=\"cv-tag\">the shape of a growing project, and the tool that builds it.\u003c/p>\u003cdiv class=\"cv-chip\">The Rust Programming Language \u003cspan class=\"dot\">·\u003c/span> Chapters 7 and 14\u003c/div>\u003cdiv class=\"cv-foot\">\u003cspan class=\"ep\">EP.08\u003c/span>\u003cspan>companion slides · watch on the Rust from Zero playlist\u003c/span>\u003c/div>\u003cdiv class=\"cv-num\">08\u003c/div>\u003c/div>","coverBig":"Modules and \u003cspan class=\"accent\">Cargo\u003c/span>","cheat":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">One file stops scaling\u003c/td>\u003ctd>one file does not scale. mod, pub, use is the fix.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Package, crate, module\u003c/td>\u003ctd>package wraps crate wraps module. rings, outside in.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">A real module tree\u003c/td>\u003ctd>cats/mod.rs or cats.rs. rust looks in both places.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Two ways to mod\u003c/td>\u003ctd>split into a file when the inline version gets long.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">The four visibility gates\u003c/td>\u003ctd>start private. promote only what callers actually need.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">use, paths, re-exports\u003c/td>\u003ctd>use just makes the name shorter. the path is still there.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Before and after\u003c/td>\u003ctd>same code. different zip code.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Cargo.toml, section by section\u003c/td>\u003ctd>cargo handles the rest. you just name what you need.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">dev vs release\u003c/td>\u003ctd>dev compiles fast. release ships fast.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">fmt, clippy, doc\u003c/td>\u003ctd>cargo publish shares it with the world. semver keeps everyone sane.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Workspaces scale projects\u003c/td>\u003ctd>each member is a crate. the workspace is the project.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Features and gates\u003c/td>\u003ctd>features = conditional compilation without runtime cost.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","slides":[{"type":"cover","title":"Modules and Cargo","notes":["\u003cb>Episode 8.\u003c/b> the shape of a growing project, and the tool that builds it.","\u003cb>Covers:\u003c/b> The Rust Programming Language · Chapters 7 and 14"]},{"type":"image","img":"img/SceneHook.webp","kicker":"Book · Ch 7 + 14 (the motivation)","title":"One file stops scaling","notes":["You start with one file. \u003ccode>main.rs\u003c/code>. It works fine at first.","Then you add a few structs. A few functions. Then a few more.","And suddenly it&#39;s four hundred lines of nowhere. You go to add the next function and you have no idea where it belongs.","Same file holds your structs, your business logic, and \u003ccode>main\u003c/code>.","Nothing is grouped. Nothing has a home.","Every new feature makes it worse.","Three keywords fix this: \u003cb>mod\u003c/b>, \u003cb>pub\u003c/b>, and \u003cb>use\u003c/b>. That&#39;s the whole lesson, and the rest of this guide is just those three in detail."],"remember":"one file does not scale. mod, pub, use is the fix."},{"type":"divider","img":"","kicker":"Chapter · Book · §7.1","title":"Module tree","notes":["Chapter break: \u003cb>Module tree\u003c/b>.","Before any syntax, you need the map. Rust nests your code in three layers: a package holds crates, a crate holds modules, and a module is just a named scope. Get those rings straight and the keywords fall into place."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Module tree\u003c/h1>\u003cp class=\"txt-lead\">Before any syntax, you need the map. Rust nests your code in three layers: a package holds crates, a crate holds modules, and a module is just a named scope. Get those rings straight and the keywords fall into place.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneMentalModel.webp","kicker":"Book · Ch 7 Managing Growing Projects","title":"Package, crate, module","notes":["Rust organizes code in three nested layers. Think rings, outside in.","\u003cb>Package\u003c/b> is the outer ring. \u003ccode>Cargo.toml\u003c/code> defines it, and it ships one or more crates together.","\u003cb>Crate\u003c/b> is the middle ring. It&#39;s a tree of modules, and its root is \u003ccode>lib.rs\u003c/code> or \u003ccode>main.rs\u003c/code>.","\u003cb>Module\u003c/b> is the inner ring. It&#39;s a named scope inside a crate, like \u003ccode>mod cats\u003c/code>.","A module is the part you create most. Each one is a separate namespace, so \u003ccode>mod cats\u003c/code> and \u003ccode>mod orders\u003c/code> never collide."],"remember":"package wraps crate wraps module. rings, outside in."},{"type":"image","img":"img/SceneModuleTree.webp","kicker":"Book · Ch 7 Managing Growing Projects","title":"A real module tree","notes":["Here is a real one. The \u003ccode>cat_cafe\u003c/code> package, with a \u003ccode>Cargo.toml\u003c/code> at the root and a \u003ccode>src\u003c/code> folder holding the crate.","The \u003ccode>cats\u003c/code> folder becomes the \u003ccode>cats\u003c/code> module. Each file inside it is a submodule.","To reach a name, you write a path. Two kinds show up constantly:","\u003cb>\u003ccode>crate::\u003c/code>\u003c/b> starts from the crate root, so it works from anywhere.","\u003cb>\u003ccode>super::\u003c/code>\u003c/b> steps one module up, like \u003ccode>..\u003c/code> in a file path.","You can name a module folder \u003ccode>cats/mod.rs\u003c/code> or a single file \u003ccode>cats.rs\u003c/code>. Rust looks in both places, so pick whichever fits how big the module is."],"remember":"cats/mod.rs or cats.rs. rust looks in both places."},{"type":"divider","img":"","kicker":"Chapter · Book · §7.2-7.4","title":"mod, pub, use","notes":["Chapter break: \u003cb>mod, pub, use\u003c/b>.","Now the three keywords from the hook, one at a time. \u003ccode>mod\u003c/code> declares a module, \u003ccode>pub\u003c/code> decides who can see what&#39;s inside, and \u003ccode>use\u003c/code> pulls a name into scope so you stop typing the full path. That&#39;s the whole toolkit."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">mod, pub, use\u003c/h1>\u003cp class=\"txt-lead\">Now the three keywords from the hook, one at a time. \u003ccode>mod\u003c/code> declares a module, \u003ccode>pub\u003c/code> decides who can see what&#39;s inside, and \u003ccode>use\u003c/code> pulls a name into scope so you stop typing the full path. That&#39;s the whole toolkit.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneModDecl.webp","kicker":"Book · Ch 7 Managing Growing Projects","title":"Two ways to mod","notes":["You can write a module inline, or point Rust at a file. Same result, different size.","Inline keeps everything in one place. It works, but it grows fast, which is exactly the pain we just showed.","The better option for anything real is a \u003ccode>mod cats;\u003c/code> with a semicolon. That tells Rust to go find the file.","Items inside a module are still private. You opt in with \u003ccode>pub\u003c/code>. And \u003ccode>pub use\u003c/code> re-exports a name so callers see it as if you defined it right there."],"remember":"split into a file when the inline version gets long."},{"type":"image","img":"img/ScenePubGates.webp","kicker":"Book · Ch 7 Managing Growing Projects","title":"The four visibility gates","notes":["Default visibility is the narrowest one: private. You opt in to wider visibility from there.","The rule is simple:","\u003cb>Start private.\u003c/b> Nothing leaks until you say so.","\u003cb>Promote only what callers actually need.\u003c/b> Each \u003ccode>pub\u003c/code> is a promise you have to keep.","\u003cb>You can widen later, but you cannot take it back.\u003c/b> Making something more public is easy; un-publishing it is a breaking change."],"remember":"start private. promote only what callers actually need."},{"type":"image","img":"img/SceneUsePaths.webp","kicker":"Book · Ch 7 Managing Growing Projects","title":"use, paths, re-exports","notes":["\u003ccode>use\u003c/code> brings a name into scope so you stop typing the full path every time. The path prefix decides where it starts.","The last line is the special one. \u003cb>\u003ccode>pub use\u003c/code>\u003c/b> re-exports a name, so callers see it as if you defined it yourself. That&#39;s how libraries build a clean public API: hide the deep module path, expose one tidy name."],"remember":"use just makes the name shorter. the path is still there."},{"type":"image","img":"img/SceneRefactorDemo.webp","kicker":"Book · Ch 7 Managing Growing Projects","title":"Before and after","notes":["Here is the payoff. One file, four hundred lines, becomes three small ones.","\u003cb>Before:\u003c/b> structs, functions, business logic, all piled into \u003ccode>main.rs\u003c/code>. You&#39;ve seen this one.","\u003cb>After:\u003c/b> three lines of \u003ccode>mod\u003c/code>, three lines of \u003ccode>use\u003c/code>, twelve lines total. Rust finds each file automatically.","Each \u003ccode>mod\u003c/code> line points Rust at a file. No wiring, no config.","Everything inside those files stays private until you \u003ccode>pub\u003c/code> it.","The logic never changed. Only where it lives did."],"remember":"same code. different zip code."},{"type":"divider","img":"","kicker":"Chapter · Book · Ch 14","title":"Cargo.toml","notes":["Chapter break: \u003cb>Cargo.toml\u003c/b>.","Modules organize your code. Cargo organizes your project. Open \u003ccode>Cargo.toml\u003c/code> and meet the file that names the package, pulls in dependencies, and tells the compiler how to build."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Cargo.toml\u003c/h1>\u003cp class=\"txt-lead\">Modules organize your code. Cargo organizes your project. Open \u003ccode>Cargo.toml\u003c/code> and meet the file that names the package, pulls in dependencies, and tells the compiler how to build.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneCargoToml.webp","kicker":"Book · Ch 14 More About Cargo","title":"Cargo.toml, section by section","notes":["Every Rust project has a \u003ccode>Cargo.toml\u003c/code>. A few sections do almost all the work.","\u003cb>\u003ccode>[package]\u003c/code>\u003c/b> is required: name, version, edition. The edition sets the Rust language version, and \u003ccode>2021\u003c/code> is the current stable one.","\u003cb>\u003ccode>[dependencies]\u003c/code>\u003c/b> is where external crates go. You name the crate and a semver range like \u003ccode>&quot;1&quot;\u003c/code> (any \u003ccode>1.x\u003c/code>), and cargo fetches it from crates.io.","\u003cb>\u003ccode>features = [...]\u003c/code>\u003c/b> opts into parts of a dependency, like \u003ccode>&quot;derive&quot;\u003c/code> on serde.","\u003cb>\u003ccode>[dev-dependencies]\u003c/code>\u003c/b> are only compiled for tests and benchmarks. They never end up in your final binary."],"remember":"cargo handles the rest. you just name what you need."},{"type":"image","img":"","kicker":"Book · Ch 14 More About Cargo","title":"dev vs release","notes":["Cargo ships two build profiles out of the box, each tuned for a different moment.","You can also write a custom \u003ccode>[profile.something]\u003c/code> and inherit from dev or release. Handy for a profiling build that keeps debug info but is still optimized."],"remember":"dev compiles fast. release ships fast.","composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Book · Ch 14 More About Cargo\u003c/div>\u003ch1 class=\"txt-title txt-title-sm\">dev vs release\u003c/h1>\u003cul class=\"txt-points\">\u003cli>Cargo ships two build profiles out of the box, each tuned for a different moment.\u003c/li>\u003cli>You can also write a custom \u003ccode>[profile.something]\u003c/code> and inherit from dev or release. Handy for a profiling build that keeps debug info but is still optimized.\u003c/li>\u003c/ul>\u003c/div>"},{"type":"image","img":"img/SceneCargoTools.webp","kicker":"Book · Ch 14 More About Cargo","title":"fmt, clippy, doc","notes":["Three tools you&#39;ll reach for every single day, and one more for when you&#39;re ready to share.","\u003cb>\u003ccode>cargo fmt\u003c/code>\u003c/b> ends every formatting argument before it starts. There&#39;s one standard style and this applies it.","\u003cb>\u003ccode>cargo clippy\u003c/code>\u003c/b> flags common mistakes and suggests the more idiomatic way.","\u003cb>\u003ccode>cargo doc\u003c/code>\u003c/b> turns your \u003ccode>///\u003c/code> comments into a browsable site, and \u003ccode>--open\u003c/code> launches it.","When the crate is ready, \u003cb>\u003ccode>cargo publish\u003c/code>\u003c/b> sends it to crates.io. Bump versions with semver so you don&#39;t break the people depending on you."],"remember":"cargo publish shares it with the world. semver keeps everyone sane."},{"type":"divider","img":"","kicker":"Chapter · Book · §14.3","title":"Workspaces","notes":["Chapter break: \u003cb>Workspaces\u003c/b>.","One package gets you far. When you have many crates that ship together, a workspace ties them under one roof. The best example is this very repo: the whole video series is one."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Workspaces\u003c/h1>\u003cp class=\"txt-lead\">One package gets you far. When you have many crates that ship together, a workspace ties them under one roof. The best example is this very repo: the whole video series is one.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneWorkspaces.webp","kicker":"Book · Ch 14 More About Cargo","title":"Workspaces scale projects","notes":["A workspace is a group of crates that live together, with one \u003ccode>Cargo.toml\u003c/code> at the root.","What you get for grouping them:","\u003cb>One lock file.\u003c/b> Every member shares the same \u003ccode>Cargo.lock\u003c/code>, so there are no version conflicts between crates.","\u003cb>One command.\u003c/b> \u003ccode>cargo test --workspace\u003c/code> tests every crate at once, and \u003ccode>cargo build --workspace\u003c/code> builds them all.","\u003cb>Shared deps.\u003c/b> Define a version once in \u003ccode>[workspace.dependencies]\u003c/code> and members inherit it with \u003ccode>dep = { workspace = true }\u003c/code>, no repeating the number.","This series is itself a workspace. All twelve episodes are members, and they share the \u003ccode>video-kit\u003c/code> design system as a local crate."],"remember":"each member is a crate. the workspace is the project."},{"type":"image","img":"img/SceneFeatures.webp","kicker":"Book · Ch 14 More About Cargo","title":"Features and gates","notes":["Features let you gate parts of your crate behind an opt-in flag, so callers compile only what they need.","Declare them in \u003ccode>[features]\u003c/code>. The \u003ccode>default\u003c/code> list is the set that turns on automatically.","Then gate code with \u003ccode>cfg\u003c/code>. That block compiles only when the feature is on, at compile time, not at runtime.","To turn a feature on, pass it at build time or add it in \u003ccode>Cargo.toml\u003c/code>:","Because it&#39;s resolved while compiling, code behind an off feature simply isn&#39;t in the binary. There&#39;s no runtime check and no dead weight."],"remember":"features = conditional compilation without runtime cost."},{"type":"quote","img":"","kicker":"Takeaway","title":"The big idea","notes":["The whole episode in one line:","One file does not scale. Modules give your code an address and cargo gives your project a shape. Structure is a feature, not a chore."],"composed":"\u003cdiv class=\"txt txt-quote\">\u003cdiv class=\"txt-kicker\">Takeaway\u003c/div>\u003cp class=\"txt-quote-text\">One file does not scale. Modules give your code an address and cargo gives your project a shape. Structure is a feature, not a chore.\u003c/p>\u003cp class=\"txt-lead\">The whole episode in one line:\u003c/p>\u003c/div>"},{"type":"cheatsheet","title":"Cheatsheet recap","notes":["Recap: one line per idea, in order. Good place to pause for questions.","\u003cb>Maps to:\u003c/b> The Rust Programming Language, Chapters 7 and 14.","\u003cb>Practice:\u003c/b> Rustlings \u003ccode>10_modules\u003c/code>, \u003ccode>22_clippy\u003c/code>."]}]};
  var SLIDES = DATA.slides;
  function stripT(s){ return (s || '').replace(/<[^>]+>/g, ''); }

  // ---- element refs ----
  var deck = document.getElementById('deck');
  var scaler = document.getElementById('scaler');
  var viewport = document.getElementById('viewport');
  var bar = document.getElementById('bar');
  var curEl = document.getElementById('cur');
  var totalEl = document.getElementById('total');
  var ctitle = document.getElementById('ctitle');
  var notes = document.getElementById('notes');
  var notesInner = document.getElementById('notesInner');
  var grid = document.getElementById('grid');
  var gridInner = document.getElementById('gridInner');
  var btnNotes = document.getElementById('btnNotes');
  var btnGrid = document.getElementById('btnGrid');
  var btnFull = document.getElementById('btnFull');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  var NOTES_KEY = 'rfz_slides_notes';
  var idx = 0;
  var notesOpen = false;
  try { notesOpen = localStorage.getItem(NOTES_KEY) === '1'; } catch(e){}

  totalEl.textContent = SLIDES.length;

  function bodyHTML(s){
    if (s.type === 'cover') return DATA.cover;
    if (s.type === 'cheatsheet') return DATA.cheat;
    if (s.composed) return s.composed;
    return '<img class="full" src="' + s.img + '" alt="' + stripT(s.title) + '" />';
  }

  function notesHTML(s){
    var pts = (s.notes || []).map(function(n){ return '<li>' + n + '</li>'; }).join('');
    var html = '';
    if (s.kicker) html += '<div class="n-kicker">' + s.kicker + '</div>';
    html += '<h2 class="n-title">' + (s.title || '') + '</h2>';
    if (pts) html += '<ul class="n-points">' + pts + '</ul>';
    else html += '<p class="n-empty">No notes for this slide.</p>';
    if (s.remember) html += '<div class="n-remember"><span>Remember</span>' + s.remember + '</div>';
    return html;
  }

  function fit(){
    var availW = viewport.clientWidth;
    var availH = viewport.clientHeight;
    var scale = Math.min(availW / 1280, availH / 720) * 0.955;
    if (!isFinite(scale) || scale <= 0) scale = 0.1;
    deck.style.transform = 'scale(' + scale + ')';
    scaler.style.width = (1280 * scale) + 'px';
    scaler.style.height = (720 * scale) + 'px';
  }

  function render(){
    var s = SLIDES[idx];
    deck.innerHTML = bodyHTML(s);
    notesInner.innerHTML = notesHTML(s);
    curEl.textContent = (idx + 1);
    ctitle.innerHTML = s.title || '';
    bar.style.width = (((idx + 1) / SLIDES.length) * 100) + '%';
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === SLIDES.length - 1);
    var hash = '#' + (idx + 1);
    if (location.hash !== hash) {
      try { history.replaceState(null, '', hash); } catch(e){ location.hash = hash; }
    }
    updateGridCurrent();
    fit();
  }

  function go(n){
    var t = Math.max(0, Math.min(SLIDES.length - 1, n));
    if (t === idx) return;
    idx = t;
    render();
  }
  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  function setNotes(open){
    notesOpen = open;
    notes.classList.toggle('open', open);
    btnNotes.classList.toggle('on', open);
    try { localStorage.setItem(NOTES_KEY, open ? '1' : '0'); } catch(e){}
    setTimeout(fit, 200);
  }
  function toggleNotes(){ setNotes(!notesOpen); }

  function setGrid(open){
    grid.classList.toggle('open', open);
    btnGrid.classList.toggle('on', open);
    if (open) updateGridCurrent();
  }
  function toggleGrid(){ setGrid(!grid.classList.contains('open')); }

  function updateGridCurrent(){
    var kids = gridInner.children;
    for (var i = 0; i < kids.length; i++){
      kids[i].classList.toggle('current', i === idx);
    }
  }

  function buildGrid(){
    var html = '';
    for (var i = 0; i < SLIDES.length; i++){
      var s = SLIDES[i];
      var inner;
      if (s.type === 'cover') inner = '<div class="composed"><div class="big">' + DATA.coverBig + '</div></div>';
      else if (s.type === 'cheatsheet') inner = '<div class="composed"><div class="big">Cheatsheet <span class="accent">recap</span></div></div>';
      else if (s.composed) inner = '<div class="composed"><div class="big">' + (s.title || '') + '</div></div>';
      else inner = '<img src="' + s.img + '" alt="" loading="lazy" />';
      html += '<div class="thumb" data-i="' + i + '" title="' + stripT(s.title) + '">' + inner + '<span class="num">' + (i + 1) + '</span></div>';
    }
    gridInner.innerHTML = html;
  }

  function toggleFull(){
    var el = document.documentElement;
    if (!document.fullscreenElement){
      (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }

  // ---- events ----
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  btnNotes.addEventListener('click', toggleNotes);
  btnGrid.addEventListener('click', toggleGrid);
  btnFull.addEventListener('click', toggleFull);
  document.getElementById('gridClose').addEventListener('click', function(){ setGrid(false); });

  deck.addEventListener('click', next);

  gridInner.addEventListener('click', function(e){
    var t = e.target.closest('.thumb');
    if (!t) return;
    go(parseInt(t.getAttribute('data-i'), 10));
    setGrid(false);
  });

  document.addEventListener('keydown', function(e){
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key;
    if (k === 'ArrowRight' || k === 'PageDown' || k === ' ' || k === 'Spacebar'){ e.preventDefault(); next(); }
    else if (k === 'ArrowLeft' || k === 'PageUp'){ e.preventDefault(); prev(); }
    else if (k === 'Home'){ e.preventDefault(); go(0); }
    else if (k === 'End'){ e.preventDefault(); go(SLIDES.length - 1); }
    else if (k === 'n' || k === 'N'){ toggleNotes(); }
    else if (k === 'g' || k === 'G'){ toggleGrid(); }
    else if (k === 'f' || k === 'F'){ toggleFull(); }
    else if (k === 'Escape'){ if (grid.classList.contains('open')) setGrid(false); }
  });

  // basic swipe
  var sx = null;
  viewport.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
  viewport.addEventListener('touchend', function(e){
    if (sx === null) return;
    var dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    sx = null;
  }, {passive:true});

  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', function(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n) && (n - 1) !== idx) go(n - 1);
  });

  // ---- init ----
  (function start(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n)) idx = Math.max(0, Math.min(SLIDES.length - 1, n - 1));
    buildGrid();
    setNotes(notesOpen);
    render();
  })();
})();
</script>
</body>
</html>
