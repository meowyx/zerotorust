<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Smart Pointers · Slides (EP.10)</title>
<!-- "Add to Home Screen" on iPhone launches this chromeless, the practical
     way to get a fullscreen-like deck where iOS blocks the Fullscreen API -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Rust EP.10" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="/icon" />
<style>
:root{
  --ink:#1c1e22; --soft:#43474e; --muted:#888d96; --line:#e3e4e8;
  --rust:#c8542a; --code-bg:#f5f5f4;
  --sans:"Bricolage Grotesque",system-ui,-apple-system,sans-serif;
  --serif:"Instrument Serif",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --stage:#0e0f12; --panel:#16181d; --sline:#26282e; --sink:#e8e6e2; --smuted:#9a9aaa;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--stage);color:var(--sink);font-family:var(--sans);overflow:hidden;}
button{font-family:inherit;}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.progress{flex:none;height:3px;background:#1d1f24;}
.progress > i{display:block;height:100%;background:var(--rust);width:0;transition:width .25s ease;}

.topbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--sink);}
.brand svg{display:block;}
.brand .sep{color:#4a4d55;font-weight:400;}
.brand .ep{font-family:var(--mono);color:var(--rust);font-weight:700;letter-spacing:.08em;}
.hint{font-family:var(--mono);font-size:11px;color:#6b6e76;white-space:nowrap;}
.hint b{color:#9a9aaa;font-weight:700;}

.middle{flex:1;display:flex;min-height:0;min-width:0;}
.viewport{flex:1;display:grid;place-items:center;min-width:0;min-height:0;position:relative;overflow:hidden;}

/* sized in JS to the scaled deck size so grid centering uses the real footprint */
.scaler{position:relative;flex:none;}
.deck{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left;border-radius:14px;overflow:hidden;background:#fff;
  box-shadow:0 30px 90px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.05);cursor:pointer;}
.deck img.full{display:block;width:100%;height:100%;object-fit:contain;background:#fff;}

/* composed: cover */
.cv{width:100%;height:100%;padding:78px 86px;display:flex;flex-direction:column;justify-content:center;position:relative;color:var(--ink);}
.cv-eyebrow{font-family:var(--mono);font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.cv-title{font-size:96px;line-height:1.04;font-weight:800;color:#16181d;margin:18px 0 0;letter-spacing:-0.01em;}
.cv-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.cv-tag{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--soft);margin:26px 0 0;max-width:760px;line-height:1.32;}
.cv-chip{margin-top:40px;align-self:flex-start;font-family:var(--mono);font-size:16px;color:var(--soft);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:8px;}
.cv-foot{position:absolute;left:86px;right:86px;bottom:54px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);padding-top:18px;font-size:15px;color:var(--muted);}
.cv-foot .ep{font-family:var(--mono);font-weight:700;color:var(--rust);letter-spacing:.12em;}
.cv-num{position:absolute;top:54px;right:86px;font-family:var(--mono);font-weight:800;font-size:120px;color:#e6e7ec;line-height:1;}

/* composed: cheatsheet */
.ck{width:100%;height:100%;padding:56px 70px;display:flex;flex-direction:column;color:var(--ink);}
.ck h2{font-size:48px;font-weight:800;color:#16181d;margin:0 0 4px;letter-spacing:-0.01em;}
.ck h2 .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.ck h2 .ck-part{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--muted);letter-spacing:.06em;vertical-align:middle;margin-left:10px;}
.ck .sub{font-size:17px;color:var(--soft);margin:0 0 18px;}
.ck table{width:100%;border-collapse:collapse;font-size:16.5px;}
.ck th{text-align:left;background:#f3f3f4;color:var(--ink);font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;border:1px solid var(--line);}
.ck td{padding:7px 12px;border:1px solid var(--line);color:var(--soft);vertical-align:top;}
.ck td.idea{font-weight:700;color:#16181d;width:38%;}
.ck code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}

/* composed: text card for slides with no still (divider / pull-quote / image-less scene) */
.txt{width:100%;height:100%;padding:64px 78px;display:flex;flex-direction:column;justify-content:center;color:var(--ink);}
.txt-kicker{font-family:var(--mono);font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
.txt-title{font-size:74px;line-height:1.04;font-weight:800;color:#16181d;margin:0;letter-spacing:-0.01em;}
.txt-title.txt-title-sm{font-size:50px;}
.txt-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.txt-lead{font-family:var(--serif);font-style:italic;font-size:30px;line-height:1.4;color:var(--soft);margin:26px 0 0;max-width:880px;}
.txt-points{margin:26px 0 0;padding-left:24px;max-width:900px;}
.txt-points li{font-size:22px;line-height:1.5;color:var(--soft);margin:0 0 12px;}
.txt-points li b{color:var(--ink);font-weight:700;}
.txt code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}
.txt-quote{justify-content:center;}
.txt-quote-text{font-family:var(--serif);font-style:italic;font-size:46px;line-height:1.28;color:#16181d;margin:0;max-width:980px;}

/* notes drawer */
.notes{flex:none;width:0;overflow:hidden;background:var(--panel);border-left:1px solid var(--sline);transition:width .18s ease,height .18s ease;}
.notes.open{width:380px;}
.notes-inner{width:380px;height:100%;overflow:auto;padding:24px 24px 40px;}
.n-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b6e76;margin-bottom:8px;}
.n-title{font-size:23px;font-weight:800;color:var(--sink);margin:0 0 14px;letter-spacing:-0.01em;}
.n-points{margin:0;padding-left:18px;}
.n-points li{font-size:14.5px;line-height:1.6;color:#c4c4cc;margin:0 0 9px;}
.n-points li b{color:#fff;font-weight:700;}
.notes-inner code{font-family:var(--mono);font-size:.86em;background:#22252b;padding:.08em .34em;border-radius:4px;color:#e7a884;}
.n-remember{margin-top:18px;border-left:3px solid var(--rust);background:rgba(200,84,42,.10);border-radius:0 8px 8px 0;padding:12px 14px;font-size:14.5px;line-height:1.55;color:#f0e6df;}
.n-remember span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);font-weight:700;margin-bottom:5px;}
.n-empty{color:#6b6e76;font-size:14px;font-style:italic;}

/* bottom controls */
.controls{flex:none;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--sline);background:#101216;}
.controls .counter{font-family:var(--mono);font-size:13px;color:var(--smuted);min-width:66px;}
.controls .counter b{color:var(--sink);}
.controls .ctitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:#c4c4cc;}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--sline);background:#1a1c22;color:var(--sink);
  font-size:13px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;transition:background .14s,border-color .14s,color .14s;}
.btn:hover{background:#23262d;border-color:#3a3d45;}
.btn:disabled{opacity:.38;cursor:not-allowed;}
.btn.icon{padding:8px 12px;font-size:17px;line-height:1;}
.btn.on{background:rgba(200,84,42,.16);border-color:rgba(200,84,42,.55);color:#f0b69e;}
.btn .k{font-family:var(--mono);font-size:10px;color:#7e818a;}

/* grid overview */
.grid{position:fixed;inset:0;z-index:80;background:rgba(8,9,11,.97);overflow:auto;padding:36px 40px 56px;display:none;}
.grid.open{display:block;}
.grid-head{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto 22px;}
.grid-head h2{font-size:20px;margin:0;color:var(--sink);font-weight:800;}
.grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;max-width:1320px;margin:0 auto;}
.thumb{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;border:1px solid var(--sline);background:#fff;cursor:pointer;transition:transform .12s,outline-color .12s;outline:2px solid transparent;}
.thumb:hover{transform:translateY(-2px);}
.thumb.current{outline-color:var(--rust);}
.thumb img{width:100%;height:100%;object-fit:contain;}
.thumb .composed{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink);padding:10px;text-align:center;}
.thumb .composed .big{font-size:22px;font-weight:800;color:#16181d;}
.thumb .composed .big .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.thumb .num{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:rgba(14,15,18,.78);border-radius:5px;padding:2px 6px;}

@media (max-width:760px){
  .hint{display:none;}
  .controls .ctitle{display:none;}
  .controls{flex-wrap:wrap;gap:8px;padding:8px 10px;}
  .btn{padding:9px 12px;}
  .btn .k{display:none;}            /* no keyboard on touch */
  #btnFull{display:none;}           /* fullscreen is niche on phones, unsupported on iOS */
  /* stack the slide on top and slide notes up from the bottom, so the
     control bar stays reachable instead of being covered by an overlay */
  .middle{flex-direction:column;}
  .notes{width:auto;height:0;border-left:none;border-top:1px solid var(--sline);}
  .notes.open{width:auto;height:46vh;}
  .notes-inner{width:auto;}
}
</style>
</head>

</div>

<script>
(function(){
  "use strict";

  var DATA = {"ep":"10","title":"Smart Pointers","cover":"\u003cdiv class=\"cv\">\u003cdiv class=\"cv-eyebrow\">MeowyTheDev · Rust from Zero\u003c/div>\u003ch1 class=\"cv-title\">\u003cspan class=\"accent\">Smart\u003c/span> Pointers\u003c/h1>\u003cp class=\"cv-tag\">owning on the heap, sharing a value, and mutating from the inside.\u003c/p>\u003cdiv class=\"cv-chip\">The Rust Programming Language \u003cspan class=\"dot\">·\u003c/span> Chapter 15\u003c/div>\u003cdiv class=\"cv-foot\">\u003cspan class=\"ep\">EP.10\u003c/span>\u003cspan>companion slides · watch on the Rust from Zero playlist\u003c/span>\u003c/div>\u003cdiv class=\"cv-num\">10\u003c/div>\u003c/div>","coverBig":"\u003cspan class=\"accent\">Smart\u003c/span> Pointers","cheat":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Three escape hatches\u003c/td>\u003ctd>each one trades a check for a capability.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Box puts a value on the heap\u003c/td>\u003ctd>box puts one value on the heap and owns it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Why Box really exists\u003c/td>\u003ctd>box gives a recursive type a known size.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Deref, and the quiet coercion\u003c/td>\u003ctd>\u003ccode>*\u003c/code> follows the pointer; coercion does it for you.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Rc shares one value\u003c/td>\u003ctd>rc gives many owners; the count frees the value at zero.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">RefCell moves the rules to runtime\u003c/td>\u003ctd>refcell moves the borrow rules to runtime; break them and it panics.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Rc&lt;RefCell&lt;T&gt;&gt;, shared and mutable\u003c/td>\u003ctd>rc&lt;refcell&lt;t&gt;&gt; is shared plus mutable, single-threaded.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Drop puts cleanup in the type\u003c/td>\u003ctd>drop runs at scope exit; you never call it yourself.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">When to reach for each\u003c/td>\u003ctd>match the need to the pointer.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","slides":[{"type":"cover","title":"Smart Pointers","notes":["\u003cb>Episode 10.\u003c/b> owning on the heap, sharing a value, and mutating from the inside.","\u003cb>Covers:\u003c/b> The Rust Programming Language · Chapter 15"]},{"type":"divider","img":"","kicker":"Chapter · Book · Ch 15","title":"Why pointers","notes":["Chapter break: \u003cb>Why pointers\u003c/b>.","Most of the time the borrow checker is enough. This chapter is about the handful of moments it isn&#39;t, and the types you reach for when you need a little more."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Why pointers\u003c/h1>\u003cp class=\"txt-lead\">Most of the time the borrow checker is enough. This chapter is about the handful of moments it isn&#39;t, and the types you reach for when you need a little more.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneWhyPointers.webp","kicker":"Book · Ch 15","title":"Three escape hatches","notes":["Smart pointers aren&#39;t scary new magic. They&#39;re three small tools, and each one hands you a capability the plain borrow checker won&#39;t.","Here&#39;s the whole family on one card:","\u003cb>\u003ccode>Box&lt;T&gt;\u003c/code>\u003c/b> moves a value onto the heap and owns it.","\u003cb>\u003ccode>Rc&lt;T&gt;\u003c/code>\u003c/b> lets many parts of your program own the same value at once.","\u003cb>\u003ccode>RefCell&lt;T&gt;\u003c/code>\u003c/b> lets you change a value through a shared reference, checked at runtime.","None of these is free. Each one trades a compile-time check for a capability you needed, and the rest of the chapter is just meeting them one at a time."],"remember":"each one trades a check for a capability."},{"type":"divider","img":"","kicker":"Chapter · Book · §15.1","title":"Box&lt;T&gt;","notes":["Chapter break: \u003cb>Box&lt;T&gt;\u003c/b>.","Start with the simplest one. \u003ccode>Box\u003c/code> puts a single value on the heap and owns it, and it turns out to be the only way to give a recursive type a size."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Box&lt;T&gt;\u003c/h1>\u003cp class=\"txt-lead\">Start with the simplest one. \u003ccode>Box\u003c/code> puts a single value on the heap and owns it, and it turns out to be the only way to give a recursive type a size.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneBoxHeap.webp","kicker":"Book · §15.1 Box&lt;T&gt;","title":"Box puts a value on the heap","notes":["\u003ccode>Box&lt;T&gt;\u003c/code> is the simplest smart pointer. You hand it a value, it moves that value onto the heap, and you get back a pointer that owns it.","\u003cb>\u003ccode>Box::new(...)\u003c/code>\u003c/b> takes a value and moves it onto the heap.","\u003cb>The box owns it.\u003c/b> When \u003ccode>cat\u003c/code> goes away, the cat is freed. No garbage collector, no manual \u003ccode>free\u003c/code>.","\u003cb>You use it like the value itself.\u003c/b> \u003ccode>cat.name\u003c/code> reaches right through the box, no unwrapping.","That last line is the whole feel of smart pointers. You hold a pointer, but it reads like you&#39;re holding the value."],"remember":"box puts one value on the heap and owns it."},{"type":"image","img":"img/SceneBoxRecursive.webp","kicker":"Book · §15.1 Box&lt;T&gt;","title":"Why Box really exists","notes":["The heap is nice, but here&#39;s the case where \u003ccode>Box\u003c/code> stops being optional. Picture a cat&#39;s ancestry: each parent has a parent, on and on.","Walk through what the compiler is worried about:","\u003cb>The type contains itself.\u003c/b> A \u003ccode>Parent\u003c/code> holds another \u003ccode>Ancestry\u003c/code>, which can be another \u003ccode>Parent\u003c/code>, forever.","\u003cb>Without \u003ccode>Box\u003c/code>, it has no size.\u003c/b> To lay it out in memory the compiler would have to add up an infinite chain, so it gives up: &quot;recursive type has infinite size.&quot;","\u003cb>\u003ccode>Box\u003c/code> is a pointer of known size.\u003c/b> It points at the next link instead of containing it, so the whole type gets a fixed, finite size."],"remember":"box gives a recursive type a known size."},{"type":"image","img":"img/SceneDeref.webp","kicker":"Book · §15.2 Deref","title":"Deref, and the quiet coercion","notes":["You&#39;ve seen \u003ccode>cat.name\u003c/code> work straight through a box. Here&#39;s the machinery that makes that happen, and one piece of magic that&#39;s easy to miss.","\u003cb>\u003ccode>*boxed\u003c/code>\u003c/b> follows the pointer to the value behind it. The star gives you the \u003ccode>Cat\u003c/code>.","\u003cb>Deref coercion\u003c/b> is the quiet part: pass \u003ccode>&amp;boxed\u003c/code> (a \u003ccode>&amp;Box&lt;Cat&gt;\u003c/code>) where a \u003ccode>&amp;Cat\u003c/code> is wanted, and Rust converts it for you. You never wrote a conversion.","\u003cb>That&#39;s why everything just works.\u003c/b> Methods and references flow right through \u003ccode>Box\u003c/code>, \u003ccode>Rc\u003c/code>, and every other smart pointer, because they all deref to the value inside."],"remember":"\u003ccode>*\u003c/code> follows the pointer; coercion does it for you."},{"type":"divider","img":"","kicker":"Chapter · Book · §15.4","title":"Rc&lt;T&gt;","notes":["Chapter break: \u003cb>Rc&lt;T&gt;\u003c/b>.","Ownership has been one-owner-at-a-time all series. \u003ccode>Rc\u003c/code> breaks that rule on purpose: many parts of your program can own the same value at once."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Rc&lt;T&gt;\u003c/h1>\u003cp class=\"txt-lead\">Ownership has been one-owner-at-a-time all series. \u003ccode>Rc\u003c/code> breaks that rule on purpose: many parts of your program can own the same value at once.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneRcShared.webp","kicker":"Book · §15.4 Rc&lt;T&gt;","title":"Rc shares one value","notes":["Sometimes a single value genuinely belongs to several places. Two kittens, one shared ancestor. \u003ccode>Rc&lt;T&gt;\u003c/code> lets them all own it, and counts how many do.","\u003cb>\u003ccode>Rc::new(...)\u003c/code>\u003c/b> wraps the value and starts a reference count. Right now one owner holds this ancestor.","\u003cb>\u003ccode>Rc::clone(&amp;ancestor)\u003c/code>\u003c/b> does not copy the cat. It hands out another owner and bumps the count, to two, then three.","\u003cb>The count is the cleanup rule.\u003c/b> When the last owner goes away and the count hits zero, the cat is freed. Shared, with no copies.","A quick note on \u003ccode>clone\u003c/code> here: it&#39;s cheap. You&#39;re cloning the pointer and bumping a counter, not duplicating the \u003ccode>Cat\u003c/code>."],"remember":"rc gives many owners; the count frees the value at zero."},{"type":"divider","img":"","kicker":"Chapter · Book · §15.5","title":"RefCell&lt;T&gt;","notes":["Chapter break: \u003cb>RefCell&lt;T&gt;\u003c/b>.","Next, mutation. \u003ccode>RefCell\u003c/code> lets you change a value through a shared reference, by moving the borrow rules from compile time to runtime."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">RefCell&lt;T&gt;\u003c/h1>\u003cp class=\"txt-lead\">Next, mutation. \u003ccode>RefCell\u003c/code> lets you change a value through a shared reference, by moving the borrow rules from compile time to runtime.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneRefCell.webp","kicker":"Book · §15.5 RefCell&lt;T&gt;","title":"RefCell moves the rules to runtime","notes":["The borrow checker normally forbids changing a value through a shared reference. \u003ccode>RefCell&lt;T&gt;\u003c/code> lets you do exactly that, by checking the same rules later instead of refusing earlier.","\u003cb>\u003ccode>RefCell&lt;Vec&lt;String&gt;&gt;\u003c/code>\u003c/b> wraps the roster so you can mutate it through \u003ccode>&amp;self\u003c/code>.","\u003cb>\u003ccode>borrow_mut()\u003c/code>\u003c/b> hands you a mutable reference. The borrow rules are still enforced, just at runtime now.","\u003cb>Break them and it panics.\u003c/b> Ask for two mutable borrows at once and the program panics, instead of failing to compile. Still safe, just later."],"remember":"refcell moves the borrow rules to runtime; break them and it panics."},{"type":"divider","img":"","kicker":"Chapter · Book · §15.5 + §15.3","title":"Combine and drop","notes":["Chapter break: \u003cb>Combine and drop\u003c/b>.","The last two pieces. First the famous combo that stacks sharing and mutation, then \u003ccode>Drop\u003c/code>, which ties cleanup to the moment a value leaves scope."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Combine and drop\u003c/h1>\u003cp class=\"txt-lead\">The last two pieces. First the famous combo that stacks sharing and mutation, then \u003ccode>Drop\u003c/code>, which ties cleanup to the moment a value leaves scope.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneCombo.webp","kicker":"Book · §15.5 RefCell&lt;T&gt;","title":"Rc&lt;RefCell&lt;T&gt;&gt;, shared and mutable","notes":["You have a tool for many owners and a tool for mutating through a share. Stack them and you get the combo you&#39;ll reach for most.","\u003cb>\u003ccode>Rc\u003c/code> on the outside\u003c/b> gives many owners of one roster.","\u003cb>\u003ccode>RefCell\u003c/code> on the inside\u003c/b> lets every one of those owners change it through a shared reference.","\u003cb>Together:\u003c/b> one cat pushes a name through \u003ccode>a\u003c/code>, and \u003ccode>b\u003c/code> sees it. Shared and mutable, single-threaded. This is where graphs and trees live."],"remember":"rc&lt;refcell&lt;t&gt;&gt; is shared plus mutable, single-threaded."},{"type":"image","img":"img/SceneDrop.webp","kicker":"Book · §15.3 Drop","title":"Drop puts cleanup in the type","notes":["Smart pointers free their value automatically. \u003ccode>Drop\u003c/code> is the trait that makes that happen, and you can use it on your own types too.","\u003cb>The \u003ccode>Drop\u003c/code> trait\u003c/b> lets a type say what should happen when it&#39;s cleaned up.","\u003cb>You never call \u003ccode>drop\u003c/code> yourself.\u003c/b> Rust runs it for you the moment the value leaves scope.","\u003cb>So cleanup is in the type.\u003c/b> The carrier releases its cat automatically. No \u003ccode>try\u003c/code>/\u003ccode>finally\u003c/code>, no \u003ccode>defer\u003c/code>, the cleanup is tied to scope. (This is the idea other languages call RAII.)"],"remember":"drop runs at scope exit; you never call it yourself."},{"type":"image","img":"img/SceneWhenEach.webp","kicker":"Book · Ch 15","title":"When to reach for each","notes":["Here&#39;s the whole chapter on one card. You don&#39;t memorize these, you match the need to the pointer.","\u003cb>\u003ccode>Box&lt;T&gt;\u003c/code>\u003c/b> for the heap and for recursive types.","\u003cb>\u003ccode>Rc&lt;T&gt;\u003c/code>\u003c/b> when many owners need the same value.","\u003cb>\u003ccode>RefCell&lt;T&gt;\u003c/code>\u003c/b> when you need to change something through a shared reference.","\u003cb>\u003ccode>Rc&lt;RefCell&lt;T&gt;&gt;\u003c/code>\u003c/b> when you need both, the combo that does the most work."],"remember":"match the need to the pointer."},{"type":"quote","img":"","kicker":"Takeaway","title":"The big idea","notes":["The whole episode in one line:","Not one pointer. The right pointer. Box, Rc, RefCell, and knowing when to reach for each."],"composed":"\u003cdiv class=\"txt txt-quote\">\u003cdiv class=\"txt-kicker\">Takeaway\u003c/div>\u003cp class=\"txt-quote-text\">Not one pointer. The right pointer. Box, Rc, RefCell, and knowing when to reach for each.\u003c/p>\u003cp class=\"txt-lead\">The whole episode in one line:\u003c/p>\u003c/div>"},{"type":"cheatsheet","title":"Cheatsheet recap","notes":["Recap: one line per idea, in order. Good place to pause for questions.","\u003cb>Maps to:\u003c/b> The Rust Programming Language, Chapter 15.","\u003cb>Practice:\u003c/b> Rustlings \u003ccode>19_smart_pointers\u003c/code>."],"composed":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Three escape hatches\u003c/td>\u003ctd>each one trades a check for a capability.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Box puts a value on the heap\u003c/td>\u003ctd>box puts one value on the heap and owns it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Why Box really exists\u003c/td>\u003ctd>box gives a recursive type a known size.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Deref, and the quiet coercion\u003c/td>\u003ctd>\u003ccode>*\u003c/code> follows the pointer; coercion does it for you.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Rc shares one value\u003c/td>\u003ctd>rc gives many owners; the count frees the value at zero.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">RefCell moves the rules to runtime\u003c/td>\u003ctd>refcell moves the borrow rules to runtime; break them and it panics.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Rc&lt;RefCell&lt;T&gt;&gt;, shared and mutable\u003c/td>\u003ctd>rc&lt;refcell&lt;t&gt;&gt; is shared plus mutable, single-threaded.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Drop puts cleanup in the type\u003c/td>\u003ctd>drop runs at scope exit; you never call it yourself.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">When to reach for each\u003c/td>\u003ctd>match the need to the pointer.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>"}]};
  var SLIDES = DATA.slides;
  function stripT(s){ return (s || '').replace(/<[^>]+>/g, ''); }

  // ---- element refs ----
  var deck = document.getElementById('deck');
  var scaler = document.getElementById('scaler');
  var viewport = document.getElementById('viewport');
  var bar = document.getElementById('bar');
  var curEl = document.getElementById('cur');
  var totalEl = document.getElementById('total');
  var ctitle = document.getElementById('ctitle');
  var notes = document.getElementById('notes');
  var notesInner = document.getElementById('notesInner');
  var grid = document.getElementById('grid');
  var gridInner = document.getElementById('gridInner');
  var btnNotes = document.getElementById('btnNotes');
  var btnGrid = document.getElementById('btnGrid');
  var btnFull = document.getElementById('btnFull');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  var NOTES_KEY = 'rfz_slides_notes';
  var idx = 0;
  var notesOpen = false;
  try { notesOpen = localStorage.getItem(NOTES_KEY) === '1'; } catch(e){}

  totalEl.textContent = SLIDES.length;

  function bodyHTML(s){
    if (s.type === 'cover') return DATA.cover;
    if (s.type === 'cheatsheet') return s.composed || DATA.cheat;
    if (s.composed) return s.composed;
    return '<img class="full" src="' + s.img + '" alt="' + stripT(s.title) + '" />';
  }

  function notesHTML(s){
    var pts = (s.notes || []).map(function(n){ return '<li>' + n + '</li>'; }).join('');
    var html = '';
    if (s.kicker) html += '<div class="n-kicker">' + s.kicker + '</div>';
    html += '<h2 class="n-title">' + (s.title || '') + '</h2>';
    if (pts) html += '<ul class="n-points">' + pts + '</ul>';
    else html += '<p class="n-empty">No notes for this slide.</p>';
    if (s.remember) html += '<div class="n-remember"><span>Remember</span>' + s.remember + '</div>';
    return html;
  }

  function fit(){
    var availW = viewport.clientWidth;
    var availH = viewport.clientHeight;
    var scale = Math.min(availW / 1280, availH / 720) * 0.955;
    if (!isFinite(scale) || scale <= 0) scale = 0.1;
    deck.style.transform = 'scale(' + scale + ')';
    scaler.style.width = (1280 * scale) + 'px';
    scaler.style.height = (720 * scale) + 'px';
  }

  function render(){
    var s = SLIDES[idx];
    deck.innerHTML = bodyHTML(s);
    notesInner.innerHTML = notesHTML(s);
    curEl.textContent = (idx + 1);
    ctitle.innerHTML = s.title || '';
    bar.style.width = (((idx + 1) / SLIDES.length) * 100) + '%';
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === SLIDES.length - 1);
    var hash = '#' + (idx + 1);
    if (location.hash !== hash) {
      try { history.replaceState(null, '', hash); } catch(e){ location.hash = hash; }
    }
    updateGridCurrent();
    fit();
  }

  function go(n){
    var t = Math.max(0, Math.min(SLIDES.length - 1, n));
    if (t === idx) return;
    idx = t;
    render();
  }
  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  function setNotes(open){
    notesOpen = open;
    notes.classList.toggle('open', open);
    btnNotes.classList.toggle('on', open);
    try { localStorage.setItem(NOTES_KEY, open ? '1' : '0'); } catch(e){}
    setTimeout(fit, 200);
  }
  function toggleNotes(){ setNotes(!notesOpen); }

  function setGrid(open){
    grid.classList.toggle('open', open);
    btnGrid.classList.toggle('on', open);
    if (open) updateGridCurrent();
  }
  function toggleGrid(){ setGrid(!grid.classList.contains('open')); }

  function updateGridCurrent(){
    var kids = gridInner.children;
    for (var i = 0; i < kids.length; i++){
      kids[i].classList.toggle('current', i === idx);
    }
  }

  function buildGrid(){
    var html = '';
    for (var i = 0; i < SLIDES.length; i++){
      var s = SLIDES[i];
      var inner;
      if (s.type === 'cover') inner = '<div class="composed"><div class="big">' + DATA.coverBig + '</div></div>';
      else if (s.type === 'cheatsheet') inner = '<div class="composed"><div class="big">Cheatsheet <span class="accent">recap</span></div></div>';
      else if (s.composed) inner = '<div class="composed"><div class="big">' + (s.title || '') + '</div></div>';
      else inner = '<img src="' + s.img + '" alt="" loading="lazy" />';
      html += '<div class="thumb" data-i="' + i + '" title="' + stripT(s.title) + '">' + inner + '<span class="num">' + (i + 1) + '</span></div>';
    }
    gridInner.innerHTML = html;
  }

  function toggleFull(){
    var el = document.documentElement;
    if (!document.fullscreenElement){
      (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }

  // ---- events ----
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  btnNotes.addEventListener('click', toggleNotes);
  btnGrid.addEventListener('click', toggleGrid);
  btnFull.addEventListener('click', toggleFull);
  document.getElementById('gridClose').addEventListener('click', function(){ setGrid(false); });

  deck.addEventListener('click', next);

  gridInner.addEventListener('click', function(e){
    var t = e.target.closest('.thumb');
    if (!t) return;
    go(parseInt(t.getAttribute('data-i'), 10));
    setGrid(false);
  });

  document.addEventListener('keydown', function(e){
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key;
    if (k === 'ArrowRight' || k === 'PageDown' || k === ' ' || k === 'Spacebar'){ e.preventDefault(); next(); }
    else if (k === 'ArrowLeft' || k === 'PageUp'){ e.preventDefault(); prev(); }
    else if (k === 'Home'){ e.preventDefault(); go(0); }
    else if (k === 'End'){ e.preventDefault(); go(SLIDES.length - 1); }
    else if (k === 'n' || k === 'N'){ toggleNotes(); }
    else if (k === 'g' || k === 'G'){ toggleGrid(); }
    else if (k === 'f' || k === 'F'){ toggleFull(); }
    else if (k === 'Escape'){ if (grid.classList.contains('open')) setGrid(false); }
  });

  // basic swipe
  var sx = null;
  viewport.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
  viewport.addEventListener('touchend', function(e){
    if (sx === null) return;
    var dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    sx = null;
  }, {passive:true});

  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', function(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n) && (n - 1) !== idx) go(n - 1);
  });

  // ---- init ----
  (function start(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n)) idx = Math.max(0, Math.min(SLIDES.length - 1, n - 1));
    buildGrid();
    setNotes(notesOpen);
    render();
  })();
})();
</script>
</body>
</html>
