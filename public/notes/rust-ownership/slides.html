<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
:root{
  --ink:#1c1e22; --soft:#43474e; --muted:#888d96; --line:#e3e4e8;
  --rust:#c8542a; --code-bg:#f5f5f4;
  --sans:"Bricolage Grotesque",system-ui,-apple-system,sans-serif;
  --serif:"Instrument Serif",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --stage:#0e0f12; --panel:#16181d; --sline:#26282e; --sink:#e8e6e2; --smuted:#9a9aaa;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--stage);color:var(--sink);font-family:var(--sans);overflow:hidden;}
button{font-family:inherit;}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.progress{flex:none;height:3px;background:#1d1f24;}
.progress > i{display:block;height:100%;background:var(--rust);width:0;transition:width .25s ease;}

.topbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--sink);}
.brand svg{display:block;}
.brand .sep{color:#4a4d55;font-weight:400;}
.brand .ep{font-family:var(--mono);color:var(--rust);font-weight:700;letter-spacing:.08em;}
.hint{font-family:var(--mono);font-size:11px;color:#6b6e76;white-space:nowrap;}
.hint b{color:#9a9aaa;font-weight:700;}

.middle{flex:1;display:flex;min-height:0;min-width:0;}
.viewport{flex:1;display:grid;place-items:center;min-width:0;min-height:0;position:relative;overflow:hidden;}

/* sized in JS to the scaled deck size so grid centering uses the real footprint */
.scaler{position:relative;flex:none;}
.deck{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left;border-radius:14px;overflow:hidden;background:#fff;
  box-shadow:0 30px 90px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.05);cursor:pointer;}
.deck img.full{display:block;width:100%;height:100%;object-fit:contain;background:#fff;}

/* composed: cover */
.cv{width:100%;height:100%;padding:78px 86px;display:flex;flex-direction:column;justify-content:center;position:relative;color:var(--ink);}
.cv-eyebrow{font-family:var(--mono);font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.cv-title{font-size:96px;line-height:1.04;font-weight:800;color:#16181d;margin:18px 0 0;letter-spacing:-0.01em;}
.cv-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.cv-tag{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--soft);margin:26px 0 0;max-width:760px;line-height:1.32;}
.cv-chip{margin-top:40px;align-self:flex-start;font-family:var(--mono);font-size:16px;color:var(--soft);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:8px;}
.cv-foot{position:absolute;left:86px;right:86px;bottom:54px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);padding-top:18px;font-size:15px;color:var(--muted);}
.cv-foot .ep{font-family:var(--mono);font-weight:700;color:var(--rust);letter-spacing:.12em;}
.cv-num{position:absolute;top:54px;right:86px;font-family:var(--mono);font-weight:800;font-size:120px;color:#e6e7ec;line-height:1;}

/* composed: cheatsheet */
.ck{width:100%;height:100%;padding:56px 70px;display:flex;flex-direction:column;color:var(--ink);}
.ck h2{font-size:48px;font-weight:800;color:#16181d;margin:0 0 4px;letter-spacing:-0.01em;}
.ck h2 .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.ck .sub{font-size:17px;color:var(--soft);margin:0 0 18px;}
.ck table{width:100%;border-collapse:collapse;font-size:16.5px;}
.ck th{text-align:left;background:#f3f3f4;color:var(--ink);font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;border:1px solid var(--line);}
.ck td{padding:7px 12px;border:1px solid var(--line);color:var(--soft);vertical-align:top;}
.ck td.idea{font-weight:700;color:#16181d;width:38%;}
.ck code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}

/* notes drawer */
.notes{flex:none;width:0;overflow:hidden;background:var(--panel);border-left:1px solid var(--sline);transition:width .18s ease,height .18s ease;}
.notes.open{width:380px;}
.notes-inner{width:380px;height:100%;overflow:auto;padding:24px 24px 40px;}
.n-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b6e76;margin-bottom:8px;}
.n-title{font-size:23px;font-weight:800;color:var(--sink);margin:0 0 14px;letter-spacing:-0.01em;}
.n-points{margin:0;padding-left:18px;}
.n-points li{font-size:14.5px;line-height:1.6;color:#c4c4cc;margin:0 0 9px;}
.n-points li b{color:#fff;font-weight:700;}
.notes-inner code{font-family:var(--mono);font-size:.86em;background:#22252b;padding:.08em .34em;border-radius:4px;color:#e7a884;}
.n-remember{margin-top:18px;border-left:3px solid var(--rust);background:rgba(200,84,42,.10);border-radius:0 8px 8px 0;padding:12px 14px;font-size:14.5px;line-height:1.55;color:#f0e6df;}
.n-remember span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);font-weight:700;margin-bottom:5px;}
.n-empty{color:#6b6e76;font-size:14px;font-style:italic;}

/* bottom controls */
.controls{flex:none;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--sline);background:#101216;}
.controls .counter{font-family:var(--mono);font-size:13px;color:var(--smuted);min-width:66px;}
.controls .counter b{color:var(--sink);}
.controls .ctitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:#c4c4cc;}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--sline);background:#1a1c22;color:var(--sink);
  font-size:13px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;transition:background .14s,border-color .14s,color .14s;}
.btn:hover{background:#23262d;border-color:#3a3d45;}
.btn:disabled{opacity:.38;cursor:not-allowed;}
.btn.icon{padding:8px 12px;font-size:17px;line-height:1;}
.btn.on{background:rgba(200,84,42,.16);border-color:rgba(200,84,42,.55);color:#f0b69e;}
.btn .k{font-family:var(--mono);font-size:10px;color:#7e818a;}

/* grid overview */
.grid{position:fixed;inset:0;z-index:80;background:rgba(8,9,11,.97);overflow:auto;padding:36px 40px 56px;display:none;}
.grid.open{display:block;}
.grid-head{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto 22px;}
.grid-head h2{font-size:20px;margin:0;color:var(--sink);font-weight:800;}
.grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;max-width:1320px;margin:0 auto;}
.thumb{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;border:1px solid var(--sline);background:#fff;cursor:pointer;transition:transform .12s,outline-color .12s;outline:2px solid transparent;}
.thumb:hover{transform:translateY(-2px);}
.thumb.current{outline-color:var(--rust);}
.thumb img{width:100%;height:100%;object-fit:contain;}
.thumb .composed{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink);padding:10px;text-align:center;}
.thumb .composed .big{font-size:22px;font-weight:800;color:#16181d;}
.thumb .composed .big .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.thumb .num{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:rgba(14,15,18,.78);border-radius:5px;padding:2px 6px;}

@media (max-width:760px){
  .hint{display:none;}
  .controls .ctitle{display:none;}
  .controls{flex-wrap:wrap;gap:8px;padding:8px 10px;}
  .btn{padding:9px 12px;}
  .btn .k{display:none;}            /* no keyboard on touch */
  #btnFull{display:none;}           /* fullscreen is niche on phones, unsupported on iOS */
  /* stack the slide on top and slide notes up from the bottom, so the
     control bar stays reachable instead of being covered by an overlay */
  .middle{flex-direction:column;}
  .notes{width:auto;height:0;border-left:none;border-top:1px solid var(--sline);}
  .notes.open{width:auto;height:46vh;}
  .notes-inner{width:auto;}
}
</style>
</head>

<script>
(function(){
  "use strict";

  var DATA = {"ep":"02","title":"Ownership and the Borrow Checker","cover":"\u003cdiv class=\"cv\">\u003cdiv class=\"cv-eyebrow\">MeowyTheDev · Rust from Zero\u003c/div>\u003ch1 class=\"cv-title\">Ownership and the \u003cspan class=\"accent\">Borrow\u003c/span> Checker\u003c/h1>\u003cp class=\"cv-tag\">every value has one owner. that one idea is the whole language.\u003c/p>\u003cdiv class=\"cv-chip\">The Rust Programming Language \u003cspan class=\"dot\">·\u003c/span> Chapter 4\u003c/div>\u003cdiv class=\"cv-foot\">\u003cspan class=\"ep\">EP.02\u003c/span>\u003cspan>companion slides · watch on the Rust from Zero playlist\u003c/span>\u003c/div>\u003cdiv class=\"cv-num\">02\u003c/div>\u003c/div>","coverBig":"Ownership and the \u003cspan class=\"accent\">Borrow\u003c/span> Checker","cheat":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">What is ownership?\u003c/td>\u003ctd>ownership = the speed of manual, the safety of GC. the learning curve is the trade.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Stack vs heap\u003c/td>\u003ctd>small + known size? stack. big or growing? heap.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">The three rules\u003c/td>\u003ctd>one owner. always. dropped when it goes out of scope.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">It moved\u003c/td>\u003ctd>ownership transfers. the old name is gone.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Two escape hatches\u003c/td>\u003ctd>stack types copy. heap types move, or \u003ccode>.clone()\u003c/code> on purpose.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Across the function boundary\u003c/td>\u003ctd>pass in, the caller loses it. return it, the caller gets it back.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Borrow, don't take\u003c/td>\u003ctd>\u003ccode>&amp;\u003c/code> to read, \u003ccode>&amp;mut\u003c/code> to change. the caller still owns it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">The two borrow rules\u003c/td>\u003ctd>learn these two and 90% of borrow errors make sense.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">A slice of the whole\u003c/td>\u003ctd>a slice = \u003ccode>&amp;\u003c/code> plus bounds. a window into the data.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Pick the right string type\u003c/td>\u003ctd>take \u003ccode>&amp;str\u003c/code> to read. take \u003ccode>String\u003c/code> only when you need to own it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">What's a lifetime?\u003c/td>\u003ctd>a lifetime = how long a reference is allowed to live.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","slides":[{"type":"cover","title":"Ownership and the Borrow Checker","notes":["\u003cb>Episode 2.\u003c/b> every value has one owner. that one idea is the whole language.","\u003cb>Covers:\u003c/b> The Rust Programming Language · Chapter 4"]},{"type":"image","img":"img/SceneOwnershipHook.webp","kicker":"Book · §4.1 What is Ownership","title":"Why ownership?","notes":["If you&#39;ve heard anything about Rust, you&#39;ve heard about ownership. It&#39;s the one idea the whole language is built on, and the part that scares people off. Good news: it&#39;s a handful of rules, and once they click, the rest of Rust follows."]},{"type":"image","img":"img/SceneWhatIsOwnership.webp","kicker":"Book · §4.1 What is Ownership","title":"What is ownership?","notes":["Ownership is just how Rust manages memory. Every value has a clear owner, and the compiler checks the rules while you write the code, not while it runs.","Most languages pick one of two strategies. Rust picks a third:","You get the speed of manual memory with the safety of a garbage collector. The price is the learning curve you&#39;re paying right now."],"remember":"ownership = the speed of manual, the safety of GC. the learning curve is the trade."},{"type":"divider","img":"img/SceneChapter01.webp","kicker":"Chapter · Book · §4.1","title":"Where data lives","notes":["Chapter break: \u003cb>Where data lives\u003c/b>.","Stack, heap, and the bridge between them. Which home your data lives in decides almost everything about ownership."]},{"type":"image","img":"img/SceneStackVsHeap.webp","kicker":"Book · §4.1 What is Ownership","title":"Stack vs heap","notes":["Your program keeps memory in two places, and they behave very differently.","\u003cb>The stack\u003c/b> is a stack of plates. You push values on top and pop them off the top, last in first out. It holds small things whose size is known when you write the code: numbers, booleans, simple structs. Fast, because the position is fixed.","\u003cb>The heap\u003c/b> is the messy room. The allocator finds free space and hands back a pointer. The pointer sits on the stack, the data sits on the heap. It holds things that can grow while the program runs: text, lists, anything whose size you don&#39;t know up front.","The part that matters for ownership:","Stack data is cleaned up automatically when its scope ends.","Heap data needs an owner to clean it up. That is the entire reason ownership exists."],"remember":"small + known size? stack. big or growing? heap."},{"type":"divider","img":"img/SceneChapter02.webp","kicker":"Chapter · Book · §4.1","title":"The three rules","notes":["Chapter break: \u003cb>The three rules\u003c/b>.","Every value has one owner. That&#39;s the whole game. Three short rules, and everything else in Rust is the compiler enforcing them."]},{"type":"image","img":"img/SceneThreeRules.webp","kicker":"Book · §4.1 What is Ownership","title":"The three rules","notes":["If you remember nothing else from this episode, remember these. They&#39;re what the compiler actually checks.","\u003cb>Every value has one owner.\u003c/b> An owner is just the variable that holds the value.","\u003cb>Only one owner at a time.\u003c/b> A value can move from one variable to another, and ownership moves with it. Never two owners at once.","\u003cb>When the owner goes out of scope, the value is dropped.\u003c/b> &quot;Dropped&quot; means Rust runs the cleanup and frees any heap memory, automatically. No garbage collector, no manual \u003ccode>free\u003c/code>.","You&#39;ve already seen all three. The stack-versus-heap cleanup was rule three working quietly. Now the rules have names."],"remember":"one owner. always. dropped when it goes out of scope."},{"type":"divider","img":"img/SceneChapter03.webp","kicker":"Chapter · Book · §4.1","title":"Move, copy, hand off","notes":["Chapter break: \u003cb>Move, copy, hand off\u003c/b>.","What happens to the data when you reassign it, or pass it to a function. Sometimes it moves. Sometimes it copies."]},{"type":"image","img":"img/SceneMoveSemantics.webp","kicker":"Book · §4.1 What is Ownership","title":"It moved","notes":["A \u003ccode>String\u003c/code> lives on the heap: the letters on the heap, a pointer to them on the stack. Watch what happens when you assign it to another variable.","In most languages, \u003ccode>let tag = cat_name\u003c/code> would copy. In Rust it&#39;s a \u003cb>move\u003c/b>: ownership transfers from \u003ccode>cat_name\u003c/code> to \u003ccode>tag\u003c/code>.","The heap data isn&#39;t copied, only the pointer on the stack moves over.","Use \u003ccode>cat_name\u003c/code> after the move and the compiler stops you, at compile time, before the program runs. \u003ccode>tag\u003c/code> works, it&#39;s the new owner.","Moves rule out two classic bugs for free: \u003cb>double-free\u003c/b> (freeing the same memory twice) and \u003cb>use-after-free\u003c/b> (reading memory after it&#39;s freed). One owner at a time, so neither can happen."],"remember":"ownership transfers. the old name is gone."},{"type":"image","img":"img/SceneCloneVsCopy.webp","kicker":"Book · §4.1 What is Ownership","title":"Two escape hatches","notes":["The move broke \u003ccode>cat_name\u003c/code>. What if you need both? Two ways out, depending on where the data lives.","\u003cb>Clone\u003c/b> makes a deep copy of the heap data. You call it by hand, so the cost is visible:","\u003cb>Copy\u003c/b> is for stack-only data. Small fixed-size values are cheap to duplicate, so Rust just copies the bits, no \u003ccode>.clone()\u003c/code> needed:","The \u003ccode>Copy\u003c/code> types are anything purely on the stack: all integer and float types, \u003ccode>bool\u003c/code>, \u003ccode>char\u003c/code>, and tuples where every piece is also \u003ccode>Copy\u003c/code>."],"remember":"stack types copy. heap types move, or \u003ccode>.clone()\u003c/code> on purpose."},{"type":"image","img":"img/SceneOwnershipFunctions.webp","kicker":"Book · §4.1 What is Ownership","title":"Across the function boundary","notes":["Moves aren&#39;t just about \u003ccode>let\u003c/code>. They happen when you pass a value to a function too.","Calling \u003ccode>say_hello(kitten)\u003c/code> \u003cb>moves\u003c/b> \u003ccode>kitten\u003c/code> into the function&#39;s \u003ccode>name\u003c/code> parameter. Same mechanic as before.","Use \u003ccode>kitten\u003c/code> after the call? Compile error.","But the function \u003cb>returns\u003c/b> the \u003ccode>String\u003c/code>, so ownership transfers back out. \u003ccode>back_again\u003c/code> is the new owner."],"remember":"pass in, the caller loses it. return it, the caller gets it back."},{"type":"divider","img":"img/SceneChapter04.webp","kicker":"Chapter · Book · §4.2","title":"Borrow, don't take","notes":["Chapter break: \u003cb>Borrow, don't take\u003c/b>.","Use a value without taking ownership of it. That&#39;s what references are for."]},{"type":"image","img":"img/SceneReferences.webp","kicker":"Book · §4.2 References and Borrowing","title":"Borrow, don&#39;t take","notes":["Sometimes a function needs to read or change a value, but you want to keep ownership in the caller. Moving would lose it. Cloning would be wasteful. Pass a \u003cb>reference\u003c/b> instead.","A shared reference (\u003ccode>&amp;\u003c/code>) is read-only:","A mutable reference (\u003ccode>&amp;mut\u003c/code>) can change the value:","\u003cb>\u003ccode>&amp;\u003c/code> shared:\u003c/b> read-only. Many readers can share the same value at once, because none of them changes it.","\u003cb>\u003ccode>&amp;mut\u003c/code> mutable:\u003c/b> read and write, but only one at a time. No sharing."],"remember":"\u003ccode>&amp;\u003c/code> to read, \u003ccode>&amp;mut\u003c/code> to change. the caller still owns it."},{"type":"image","img":"img/SceneBorrowRules.webp","kicker":"Book · §4.2 References and Borrowing","title":"The two borrow rules","notes":["The borrow checker enforces reference safety with just two rules. Learn these and most borrow errors start to make sense.","\u003cb>Rule 1: one \u003ccode>&amp;mut\u003c/code>, or many \u003ccode>&amp;\u003c/code>. Never both.\u003c/b>","This stops two writers clashing, or a reader seeing a half-finished change.","\u003cb>Rule 2: references must always be valid.\u003c/b> A reference to something that&#39;s gone is a dangling reference, and Rust won&#39;t let you make one:"],"remember":"learn these two and 90% of borrow errors make sense."},{"type":"divider","img":"img/SceneChapter05.webp","kicker":"Chapter · Book · §4.3","title":"Slicing into data","notes":["Chapter break: \u003cb>Slicing into data\u003c/b>.","Look at part of a thing without taking it. Slices are references with bounds."]},{"type":"image","img":"img/SceneSlices.webp","kicker":"Book · §4.3 The Slice Type","title":"A slice of the whole","notes":["Sometimes you only want part of a value, not the whole thing. That&#39;s a slice: a reference to a range.","A slice is a \u003cb>reference\u003c/b>, not a copy. Two indices: where it starts, where it ends.","The same \u003ccode>&amp;x[start..end]\u003c/code> syntax works on arrays too.","Slices follow the borrow rules: because they point into the original, the original can&#39;t disappear while the slice is alive."],"remember":"a slice = \u003ccode>&amp;\u003c/code> plus bounds. a window into the data."},{"type":"image","img":"img/SceneStringVsStr.webp","kicker":"Book · §4.3 The Slice Type","title":"Pick the right string type","notes":["What type should a function take for a string parameter? Quick refresher: \u003ccode>String\u003c/code> is the owned, growable, heap type. \u003ccode>&amp;str\u003c/code> is a reference to string data (a slice).","Take \u003ccode>&amp;str\u003c/code> and you accept both:","Take \u003ccode>&amp;String\u003c/code> and you lock yourself in:","Need an owned \u003ccode>String\u003c/code> later? Convert with \u003ccode>String::from\u003c/code>, \u003ccode>.to_string()\u003c/code>, or \u003ccode>.to_owned()\u003c/code>. All three do the same thing."],"remember":"take \u003ccode>&amp;str\u003c/code> to read. take \u003ccode>String\u003c/code> only when you need to own it."},{"type":"divider","img":"img/SceneChapter06.webp","kicker":"Chapter · Book · §10.3 (preview)","title":"Intro to lifetimes","notes":["Chapter break: \u003cb>Intro to lifetimes\u003c/b>.","Just the basics here. The full deep dive is episode 06. For now: a lifetime is how long a reference is allowed to stick around."]},{"type":"image","img":"img/SceneLifetimesTeaser.webp","kicker":"Book · lifetime preview (full in §10.3)","title":"What&#39;s a lifetime?","notes":["Remember rule two, references must always be valid? That rule has a name: a \u003cb>lifetime\u003c/b>. Every reference has one, and it&#39;s the span of code where the reference is allowed to exist.","\u003ccode>cat_name\u003c/code> is born, \u003ccode>label\u003c/code> borrows it, and both go out of scope at the closing brace.","\u003ccode>label\u003c/code> can&#39;t live past \u003ccode>cat_name\u003c/code>. Same idea as the dangling reference from the borrow checker, now it has a name.","Sometimes Rust can&#39;t work the relationship out on its own, so you label it:","\u003ccode>&#39;a\u003c/code> is just a name. Here it says the input and the output share the same lifetime. Most of the time Rust figures this out for you. Episode 06 covers writing them by hand."],"remember":"a lifetime = how long a reference is allowed to live."},{"type":"quote","img":"img/ScenePullQuote.webp","kicker":"Takeaway","title":"The big idea","notes":["The whole episode in three words:","One owner. Always. Everything else in Rust follows from this."]},{"type":"cheatsheet","title":"Cheatsheet recap","notes":["Recap: one line per idea, in order. Good place to pause for questions.","\u003cb>Maps to:\u003c/b> The Rust Programming Language, Chapter 4.","\u003cb>Practice:\u003c/b> Rustlings \u003ccode>06_move_semantics\u003c/code>, \u003ccode>04_primitive_types\u003c/code>."]}]};
  var SLIDES = DATA.slides;
  function stripT(s){ return (s || '').replace(/<[^>]+>/g, ''); }

  // ---- element refs ----
  var deck = document.getElementById('deck');
  var scaler = document.getElementById('scaler');
  var viewport = document.getElementById('viewport');
  var bar = document.getElementById('bar');
  var curEl = document.getElementById('cur');
  var totalEl = document.getElementById('total');
  var ctitle = document.getElementById('ctitle');
  var notes = document.getElementById('notes');
  var notesInner = document.getElementById('notesInner');
  var grid = document.getElementById('grid');
  var gridInner = document.getElementById('gridInner');
  var btnNotes = document.getElementById('btnNotes');
  var btnGrid = document.getElementById('btnGrid');
  var btnFull = document.getElementById('btnFull');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  var NOTES_KEY = 'rfz_slides_notes';
  var idx = 0;
  var notesOpen = false;
  try { notesOpen = localStorage.getItem(NOTES_KEY) === '1'; } catch(e){}

  totalEl.textContent = SLIDES.length;

  function bodyHTML(s){
    if (s.type === 'cover') return DATA.cover;
    if (s.type === 'cheatsheet') return DATA.cheat;
    return '<img class="full" src="' + s.img + '" alt="' + stripT(s.title) + '" />';
  }

  function notesHTML(s){
    var pts = (s.notes || []).map(function(n){ return '<li>' + n + '</li>'; }).join('');
    var html = '';
    if (s.kicker) html += '<div class="n-kicker">' + s.kicker + '</div>';
    html += '<h2 class="n-title">' + (s.title || '') + '</h2>';
    if (pts) html += '<ul class="n-points">' + pts + '</ul>';
    else html += '<p class="n-empty">No notes for this slide.</p>';
    if (s.remember) html += '<div class="n-remember"><span>Remember</span>' + s.remember + '</div>';
    return html;
  }

  function fit(){
    var availW = viewport.clientWidth;
    var availH = viewport.clientHeight;
    var scale = Math.min(availW / 1280, availH / 720) * 0.955;
    if (!isFinite(scale) || scale <= 0) scale = 0.1;
    deck.style.transform = 'scale(' + scale + ')';
    scaler.style.width = (1280 * scale) + 'px';
    scaler.style.height = (720 * scale) + 'px';
  }

  function render(){
    var s = SLIDES[idx];
    deck.innerHTML = bodyHTML(s);
    notesInner.innerHTML = notesHTML(s);
    curEl.textContent = (idx + 1);
    ctitle.innerHTML = s.title || '';
    bar.style.width = (((idx + 1) / SLIDES.length) * 100) + '%';
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === SLIDES.length - 1);
    var hash = '#' + (idx + 1);
    if (location.hash !== hash) {
      try { history.replaceState(null, '', hash); } catch(e){ location.hash = hash; }
    }
    updateGridCurrent();
    fit();
  }

  function go(n){
    var t = Math.max(0, Math.min(SLIDES.length - 1, n));
    if (t === idx) return;
    idx = t;
    render();
  }
  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  function setNotes(open){
    notesOpen = open;
    notes.classList.toggle('open', open);
    btnNotes.classList.toggle('on', open);
    try { localStorage.setItem(NOTES_KEY, open ? '1' : '0'); } catch(e){}
    setTimeout(fit, 200);
  }
  function toggleNotes(){ setNotes(!notesOpen); }

  function setGrid(open){
    grid.classList.toggle('open', open);
    btnGrid.classList.toggle('on', open);
    if (open) updateGridCurrent();
  }
  function toggleGrid(){ setGrid(!grid.classList.contains('open')); }

  function updateGridCurrent(){
    var kids = gridInner.children;
    for (var i = 0; i < kids.length; i++){
      kids[i].classList.toggle('current', i === idx);
    }
  }

  function buildGrid(){
    var html = '';
    for (var i = 0; i < SLIDES.length; i++){
      var s = SLIDES[i];
      var inner;
      if (s.type === 'cover') inner = '<div class="composed"><div class="big">' + DATA.coverBig + '</div></div>';
      else if (s.type === 'cheatsheet') inner = '<div class="composed"><div class="big">Cheatsheet <span class="accent">recap</span></div></div>';
      else inner = '<img src="' + s.img + '" alt="" loading="lazy" />';
      html += '<div class="thumb" data-i="' + i + '" title="' + stripT(s.title) + '">' + inner + '<span class="num">' + (i + 1) + '</span></div>';
    }
    gridInner.innerHTML = html;
  }

  function toggleFull(){
    var el = document.documentElement;
    if (!document.fullscreenElement){
      (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }

  // ---- events ----
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  btnNotes.addEventListener('click', toggleNotes);
  btnGrid.addEventListener('click', toggleGrid);
  btnFull.addEventListener('click', toggleFull);
  document.getElementById('gridClose').addEventListener('click', function(){ setGrid(false); });

  deck.addEventListener('click', next);

  gridInner.addEventListener('click', function(e){
    var t = e.target.closest('.thumb');
    if (!t) return;
    go(parseInt(t.getAttribute('data-i'), 10));
    setGrid(false);
  });

  document.addEventListener('keydown', function(e){
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key;
    if (k === 'ArrowRight' || k === 'PageDown' || k === ' ' || k === 'Spacebar'){ e.preventDefault(); next(); }
    else if (k === 'ArrowLeft' || k === 'PageUp'){ e.preventDefault(); prev(); }
    else if (k === 'Home'){ e.preventDefault(); go(0); }
    else if (k === 'End'){ e.preventDefault(); go(SLIDES.length - 1); }
    else if (k === 'n' || k === 'N'){ toggleNotes(); }
    else if (k === 'g' || k === 'G'){ toggleGrid(); }
    else if (k === 'f' || k === 'F'){ toggleFull(); }
    else if (k === 'Escape'){ if (grid.classList.contains('open')) setGrid(false); }
  });

  // basic swipe
  var sx = null;
  viewport.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
  viewport.addEventListener('touchend', function(e){
    if (sx === null) return;
    var dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    sx = null;
  }, {passive:true});

  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', function(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n) && (n - 1) !== idx) go(n - 1);
  });

  // ---- init ----
  (function start(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n)) idx = Math.max(0, Math.min(SLIDES.length - 1, n - 1));
    buildGrid();
    setNotes(notesOpen);
    render();
  })();
})();
</script>
</body>
</html>
