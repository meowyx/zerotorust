<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Writing Tests · Slides (EP.09)</title>
<!-- "Add to Home Screen" on iPhone launches this chromeless, the practical
     way to get a fullscreen-like deck where iOS blocks the Fullscreen API -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Rust EP.09" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="/icon" />
<style>
:root{
  --ink:#1c1e22; --soft:#43474e; --muted:#888d96; --line:#e3e4e8;
  --rust:#c8542a; --code-bg:#f5f5f4;
  --sans:"Bricolage Grotesque",system-ui,-apple-system,sans-serif;
  --serif:"Instrument Serif",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --stage:#0e0f12; --panel:#16181d; --sline:#26282e; --sink:#e8e6e2; --smuted:#9a9aaa;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--stage);color:var(--sink);font-family:var(--sans);overflow:hidden;}
button{font-family:inherit;}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.progress{flex:none;height:3px;background:#1d1f24;}
.progress > i{display:block;height:100%;background:var(--rust);width:0;transition:width .25s ease;}

.topbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--sink);}
.brand svg{display:block;}
.brand .sep{color:#4a4d55;font-weight:400;}
.brand .ep{font-family:var(--mono);color:var(--rust);font-weight:700;letter-spacing:.08em;}
.hint{font-family:var(--mono);font-size:11px;color:#6b6e76;white-space:nowrap;}
.hint b{color:#9a9aaa;font-weight:700;}

.middle{flex:1;display:flex;min-height:0;min-width:0;}
.viewport{flex:1;display:grid;place-items:center;min-width:0;min-height:0;position:relative;overflow:hidden;}

/* sized in JS to the scaled deck size so grid centering uses the real footprint */
.scaler{position:relative;flex:none;}
.deck{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left;border-radius:14px;overflow:hidden;background:#fff;
  box-shadow:0 30px 90px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.05);cursor:pointer;}
.deck img.full{display:block;width:100%;height:100%;object-fit:contain;background:#fff;}

/* composed: cover */
.cv{width:100%;height:100%;padding:78px 86px;display:flex;flex-direction:column;justify-content:center;position:relative;color:var(--ink);}
.cv-eyebrow{font-family:var(--mono);font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.cv-title{font-size:96px;line-height:1.04;font-weight:800;color:#16181d;margin:18px 0 0;letter-spacing:-0.01em;}
.cv-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.cv-tag{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--soft);margin:26px 0 0;max-width:760px;line-height:1.32;}
.cv-chip{margin-top:40px;align-self:flex-start;font-family:var(--mono);font-size:16px;color:var(--soft);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:8px;}
.cv-foot{position:absolute;left:86px;right:86px;bottom:54px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);padding-top:18px;font-size:15px;color:var(--muted);}
.cv-foot .ep{font-family:var(--mono);font-weight:700;color:var(--rust);letter-spacing:.12em;}
.cv-num{position:absolute;top:54px;right:86px;font-family:var(--mono);font-weight:800;font-size:120px;color:#e6e7ec;line-height:1;}

/* composed: cheatsheet */
.ck{width:100%;height:100%;padding:56px 70px;display:flex;flex-direction:column;color:var(--ink);}
.ck h2{font-size:48px;font-weight:800;color:#16181d;margin:0 0 4px;letter-spacing:-0.01em;}
.ck h2 .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.ck h2 .ck-part{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--muted);letter-spacing:.06em;vertical-align:middle;margin-left:10px;}
.ck .sub{font-size:17px;color:var(--soft);margin:0 0 18px;}
.ck table{width:100%;border-collapse:collapse;font-size:16.5px;}
.ck th{text-align:left;background:#f3f3f4;color:var(--ink);font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;border:1px solid var(--line);}
.ck td{padding:7px 12px;border:1px solid var(--line);color:var(--soft);vertical-align:top;}
.ck td.idea{font-weight:700;color:#16181d;width:38%;}
.ck code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}

/* composed: text card for slides with no still (divider / pull-quote / image-less scene) */
.txt{width:100%;height:100%;padding:64px 78px;display:flex;flex-direction:column;justify-content:center;color:var(--ink);}
.txt-kicker{font-family:var(--mono);font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
.txt-title{font-size:74px;line-height:1.04;font-weight:800;color:#16181d;margin:0;letter-spacing:-0.01em;}
.txt-title.txt-title-sm{font-size:50px;}
.txt-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.txt-lead{font-family:var(--serif);font-style:italic;font-size:30px;line-height:1.4;color:var(--soft);margin:26px 0 0;max-width:880px;}
.txt-points{margin:26px 0 0;padding-left:24px;max-width:900px;}
.txt-points li{font-size:22px;line-height:1.5;color:var(--soft);margin:0 0 12px;}
.txt-points li b{color:var(--ink);font-weight:700;}
.txt code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}
.txt-quote{justify-content:center;}
.txt-quote-text{font-family:var(--serif);font-style:italic;font-size:46px;line-height:1.28;color:#16181d;margin:0;max-width:980px;}

/* notes drawer */
.notes{flex:none;width:0;overflow:hidden;background:var(--panel);border-left:1px solid var(--sline);transition:width .18s ease,height .18s ease;}
.notes.open{width:380px;}
.notes-inner{width:380px;height:100%;overflow:auto;padding:24px 24px 40px;}
.n-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b6e76;margin-bottom:8px;}
.n-title{font-size:23px;font-weight:800;color:var(--sink);margin:0 0 14px;letter-spacing:-0.01em;}
.n-points{margin:0;padding-left:18px;}
.n-points li{font-size:14.5px;line-height:1.6;color:#c4c4cc;margin:0 0 9px;}
.n-points li b{color:#fff;font-weight:700;}
.notes-inner code{font-family:var(--mono);font-size:.86em;background:#22252b;padding:.08em .34em;border-radius:4px;color:#e7a884;}
.n-remember{margin-top:18px;border-left:3px solid var(--rust);background:rgba(200,84,42,.10);border-radius:0 8px 8px 0;padding:12px 14px;font-size:14.5px;line-height:1.55;color:#f0e6df;}
.n-remember span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);font-weight:700;margin-bottom:5px;}
.n-empty{color:#6b6e76;font-size:14px;font-style:italic;}

/* bottom controls */
.controls{flex:none;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--sline);background:#101216;}
.controls .counter{font-family:var(--mono);font-size:13px;color:var(--smuted);min-width:66px;}
.controls .counter b{color:var(--sink);}
.controls .ctitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:#c4c4cc;}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--sline);background:#1a1c22;color:var(--sink);
  font-size:13px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;transition:background .14s,border-color .14s,color .14s;}
.btn:hover{background:#23262d;border-color:#3a3d45;}
.btn:disabled{opacity:.38;cursor:not-allowed;}
.btn.icon{padding:8px 12px;font-size:17px;line-height:1;}
.btn.on{background:rgba(200,84,42,.16);border-color:rgba(200,84,42,.55);color:#f0b69e;}
.btn .k{font-family:var(--mono);font-size:10px;color:#7e818a;}

/* grid overview */
.grid{position:fixed;inset:0;z-index:80;background:rgba(8,9,11,.97);overflow:auto;padding:36px 40px 56px;display:none;}
.grid.open{display:block;}
.grid-head{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto 22px;}
.grid-head h2{font-size:20px;margin:0;color:var(--sink);font-weight:800;}
.grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;max-width:1320px;margin:0 auto;}
.thumb{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;border:1px solid var(--sline);background:#fff;cursor:pointer;transition:transform .12s,outline-color .12s;outline:2px solid transparent;}
.thumb:hover{transform:translateY(-2px);}
.thumb.current{outline-color:var(--rust);}
.thumb img{width:100%;height:100%;object-fit:contain;}
.thumb .composed{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink);padding:10px;text-align:center;}
.thumb .composed .big{font-size:22px;font-weight:800;color:#16181d;}
.thumb .composed .big .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.thumb .num{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:rgba(14,15,18,.78);border-radius:5px;padding:2px 6px;}

@media (max-width:760px){
  .hint{display:none;}
  .controls .ctitle{display:none;}
  .controls{flex-wrap:wrap;gap:8px;padding:8px 10px;}
  .btn{padding:9px 12px;}
  .btn .k{display:none;}            /* no keyboard on touch */
  #btnFull{display:none;}           /* fullscreen is niche on phones, unsupported on iOS */
  /* stack the slide on top and slide notes up from the bottom, so the
     control bar stays reachable instead of being covered by an overlay */
  .middle{flex-direction:column;}
  .notes{width:auto;height:0;border-left:none;border-top:1px solid var(--sline);}
  .notes.open{width:auto;height:46vh;}
  .notes-inner{width:auto;}
}
</style>
</head>

  <div class="topbar">

      <svg viewBox="0 0 28 20" width="20" height="14" aria-hidden="true"><rect width="28" height="20" rx="5" fill="#FF0033"/><path d="M11 6l7 4-7 4z" fill="#fff"/></svg>
      MeowyTheDev <span class="sep">·</span> Rust from Zero <span class="sep">·</span> <span class="ep">EP.09</span>

</div>

<div class="grid" id="grid">
  <div class="grid-head">
    <h2>All slides</h2>
    <button class="btn" id="gridClose">Close <span class="k">Esc</span></button>
  </div>
  <div class="grid-inner" id="gridInner"></div>
</div>

<script>
(function(){
  "use strict";

  var DATA = {"ep":"09","title":"Writing Tests","cover":"\u003cdiv class=\"cv\">\u003cdiv class=\"cv-eyebrow\">MeowyTheDev · Rust from Zero\u003c/div>\u003ch1 class=\"cv-title\">Writing \u003cspan class=\"accent\">Tests\u003c/span>\u003c/h1>\u003cp class=\"cv-tag\">the confidence to change your code without breaking it.\u003c/p>\u003cdiv class=\"cv-chip\">The Rust Programming Language \u003cspan class=\"dot\">·\u003c/span> Chapter 11\u003c/div>\u003cdiv class=\"cv-foot\">\u003cspan class=\"ep\">EP.09\u003c/span>\u003cspan>companion slides · watch on the Rust from Zero playlist\u003c/span>\u003c/div>\u003cdiv class=\"cv-num\">09\u003c/div>\u003c/div>","coverBig":"Writing \u003cspan class=\"accent\">Tests\u003c/span>","cheat":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Why test at all?\u003c/td>\u003ctd>tests are the confidence to change code, not a chore on top of it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Your first test\u003c/td>\u003ctd>a test is a plain function with #[test] on top, living in a cfg(test) module.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Pick the right assertion\u003c/td>\u003ctd>prefer assert_eq!, its failure message hands you the two values for free.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Test the panic\u003c/td>\u003ctd>#[should_panic(expected = ...)] tests that the unhappy path fails the right way.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Tests can return errors\u003c/td>\u003ctd>return Result from a test so ? can short-circuit a failure for you.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Two homes for tests\u003c/td>\u003ctd>unit tests see everything, integration tests see only your api.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Run the slice you need\u003c/td>\u003ctd>run the slice you need, not the whole suite every time.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Read the result\u003c/td>\u003ctd>red shows the exact left and right values, so you debug before you open the code.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","slides":[{"type":"cover","title":"Writing Tests","notes":["\u003cb>Episode 9.\u003c/b> the confidence to change your code without breaking it.","\u003cb>Covers:\u003c/b> The Rust Programming Language · Chapter 11"]},{"type":"divider","img":"","kicker":"Chapter · Book · §11.1","title":"Writing tests","notes":["Chapter break: \u003cb>Writing tests\u003c/b>.","Tests get a bad rap as extra homework. They&#39;re really the thing that lets you change your code and know, in one command, whether you broke anything. We start with the smallest real test."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Writing tests\u003c/h1>\u003cp class=\"txt-lead\">Tests get a bad rap as extra homework. They&#39;re really the thing that lets you change your code and know, in one command, whether you broke anything. We start with the smallest real test.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneWhyTest.webp","kicker":"Book · §11.1 How to Write Tests","title":"Why test at all?","notes":["Before you write a single test, here&#39;s why they&#39;re worth it. Picture two ways of working.","\u003cb>Without tests,\u003c/b> every change is a gamble. You edit some code, click around by hand to check it, and hope nothing else broke. You never quite know.","\u003cb>With tests,\u003c/b> you change whatever you want, run one command, and the suite tells you exactly what still works. The hoping is gone.","So tests aren&#39;t extra work bolted onto the real job. They&#39;re the thing that lets you change code without fear."],"remember":"tests are the confidence to change code, not a chore on top of it."},{"type":"image","img":"img/SceneFirstTest.webp","kicker":"Book · §11.1 How to Write Tests","title":"Your first test","notes":["Start with the function you want to check. In the \u003ccode>adoption\u003c/code> crate, \u003ccode>adoption_fee\u003c/code> turns a kitten&#39;s age into a price.","Read the test part piece by piece:","\u003cb>\u003ccode>#[cfg(test)] mod tests\u003c/code>\u003c/b> is where tests live, right next to the code. The \u003ccode>cfg(test)\u003c/code> part means this module only builds when you run tests, never in your shipped binary.","\u003cb>\u003ccode>use super::*;\u003c/code>\u003c/b> pulls in everything from the file above, so the test can see \u003ccode>adoption_fee\u003c/code>.","\u003cb>\u003ccode>#[test]\u003c/code>\u003c/b> marks one plain function as a test that Rust should run.","\u003cb>\u003ccode>assert_eq!\u003c/code>\u003c/b> checks that two values are equal. If they differ, the test fails and prints both.","A newborn kitten should cost \u003ccode>150\u003c/code>. Run \u003ccode>cargo test\u003c/code> and Rust checks it for you:","Green. That&#39;s the whole loop: write the function, write a \u003ccode>#[test]\u003c/code> next to it, assert what you expect, run."],"remember":"a test is a plain function with #[test] on top, living in a cfg(test) module."},{"type":"divider","img":"","kicker":"Chapter · Book · §11.1","title":"Assertions","notes":["Chapter break: \u003cb>Assertions\u003c/b>.","A test is only as good as the question it asks. Assertions are how you ask: this should be true, these two should be equal, these two should differ."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Assertions\u003c/h1>\u003cp class=\"txt-lead\">A test is only as good as the question it asks. Assertions are how you ask: this should be true, these two should be equal, these two should differ.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneAssertions.webp","kicker":"Book · §11.1 How to Write Tests","title":"Pick the right assertion","notes":["There are three macros in the family, and each says a slightly different thing.","\u003cb>\u003ccode>assert!\u003c/code>\u003c/b> passes when its expression is true. Reach for it on any boolean check, like &quot;does the shelter have room?&quot;","\u003cb>\u003ccode>assert_eq!\u003c/code>\u003c/b> checks that left equals right, and prints both values when it fails.","\u003cb>\u003ccode>assert_ne!\u003c/code>\u003c/b> is the mirror image. It fails only if the two are equal. A kitten fee should not match an adult fee.","Reach for \u003ccode>assert_eq!\u003c/code> by default. When it fails, the message shows you both values, so it does most of the debugging for you."],"remember":"prefer assert_eq!, its failure message hands you the two values for free."},{"type":"image","img":"img/SceneShouldPanic.webp","kicker":"Book · §11.1 How to Write Tests","title":"Test the panic","notes":["Sometimes the correct behavior is to panic. In the \u003ccode>adoption\u003c/code> crate, an adopter under eighteen should be rejected, loudly.","\u003cb>The panic.\u003c/b> \u003ccode>Application::new\u003c/code> uses \u003ccode>assert!\u003c/code> to reject anyone under 18. It panics with a clear message.","\u003cb>\u003ccode>#[should_panic]\u003c/code>\u003c/b> flips the test around. Normally a panic means failure. With this attribute, the test passes \u003cem>only if\u003c/em> the code panics.","\u003cb>\u003ccode>expected = &quot;18 or older&quot;\u003c/code>\u003c/b> makes it precise. The panic message has to contain this text, so a different, accidental panic still fails the test.","\u003cb>The call.\u003c/b> Passing \u003ccode>15\u003c/code> to \u003ccode>new\u003c/code> must panic, and that is exactly what makes \u003ccode>rejects_minors\u003c/code> go green."],"remember":"#[should_panic(expected = ...)] tests that the unhappy path fails the right way."},{"type":"image","img":"img/SceneResultTests.webp","kicker":"Book · §11.1 How to Write Tests","title":"Tests can return errors","notes":["Some functions hand back a \u003ccode>Result\u003c/code>. Here \u003ccode>confirm\u003c/code> gives you the fee on success, or an \u003ccode>Err\u003c/code> when the shelter is full.","\u003cb>A test can return \u003ccode>Result\u003c/code> too.\u003c/b> Give it the return type \u003ccode>Result&lt;(), String&gt;\u003c/code>. When the test returns \u003ccode>Ok(())\u003c/code>, it counts as passed.","\u003cb>Now \u003ccode>?\u003c/code> earns its keep.\u003c/b> The question mark operator unwraps an \u003ccode>Ok\u003c/code> value, or returns the \u003ccode>Err\u003c/code> and fails the test for you. No \u003ccode>unwrap\u003c/code>, no manual match.","\u003cb>Then assert like normal.\u003c/b> Once you have the \u003ccode>fee\u003c/code>, check it with \u003ccode>assert_eq!\u003c/code> exactly as before.","\u003cb>\u003ccode>Ok(())\u003c/code> ends it.\u003c/b> That final line is how a \u003ccode>Result\u003c/code> test says &quot;we made it, passed.&quot;"],"remember":"return Result from a test so ? can short-circuit a failure for you."},{"type":"divider","img":"","kicker":"Chapter · Book · §11.3","title":"Organizing","notes":["Chapter break: \u003cb>Organizing\u003c/b>.","Tests don&#39;t all live in the same place, and the place changes what they can see. There are two homes: one inside the file, one in its own folder."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Organizing\u003c/h1>\u003cp class=\"txt-lead\">Tests don&#39;t all live in the same place, and the place changes what they can see. There are two homes: one inside the file, one in its own folder.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneUnitVsIntegration.webp","kicker":"Book · §11.3 Test Organization","title":"Two homes for tests","notes":["Unit tests live inside the file they test. Integration tests live in their own folder and use your crate from the outside, like a real user would.","\u003cb>Unit tests\u003c/b> sit in a \u003ccode>#[cfg(test)] mod tests\u003c/code> block in the same file. Because they live inside the crate, they can reach private functions.","\u003cb>Integration tests\u003c/b> go in \u003ccode>tests/adoption.rs\u003c/code>. They \u003ccode>use adoption::*\u003c/code> to pull your crate in from outside, so they only see your public API. That makes them the honest test of what you actually ship."],"remember":"unit tests see everything, integration tests see only your api."},{"type":"divider","img":"","kicker":"Chapter · Book · §11.2","title":"Running","notes":["Chapter break: \u003cb>Running\u003c/b>.","\u003ccode>cargo test\u003c/code> runs the whole suite by default, but you rarely need all of it while you work. Here is how to run just the slice you care about."],"composed":"\u003cdiv class=\"txt\">\u003cdiv class=\"txt-kicker\">Chapter\u003c/div>\u003ch1 class=\"txt-title\">Running\u003c/h1>\u003cp class=\"txt-lead\">\u003ccode>cargo test\u003c/code> runs the whole suite by default, but you rarely need all of it while you work. Here is how to run just the slice you care about.\u003c/p>\u003c/div>"},{"type":"image","img":"img/SceneRunningTests.webp","kicker":"Book · §11.2 Running Tests","title":"Run the slice you need","notes":["By itself, \u003ccode>cargo test\u003c/code> runs every test in the crate. A few flags let you narrow that down.","\u003cb>\u003ccode>cargo test\u003c/code>\u003c/b> on its own runs everything.","\u003cb>\u003ccode>cargo test kitten\u003c/code>\u003c/b> runs only the tests whose names contain \u003ccode>kitten\u003c/code>. Great while you&#39;re iterating on one thing.","\u003cb>\u003ccode>#[ignore]\u003c/code> plus \u003ccode>--ignored\u003c/code>\u003c/b> is for the slow tests. Tag them with \u003ccode>#[ignore]\u003c/code> so they sit out normal runs, then run them on demand with \u003ccode>cargo test -- --ignored\u003c/code>.","\u003cb>\u003ccode>--show-output\u003c/code>\u003c/b> brings back the noise. Passing tests stay quiet by default. This flag prints their \u003ccode>println!\u003c/code> lines too, when you want to see them."],"remember":"run the slice you need, not the whole suite every time."},{"type":"image","img":"img/SceneTestOutput.webp","kicker":"Book · §11.2 Running Tests","title":"Read the result","notes":["Here is what a run looks like: one line per test, then a tidy summary at the bottom.","\u003cb>Green \u003ccode>ok\u003c/code> means passed.\u003c/b> That little hit of green is the whole point of writing them.","\u003cb>Red \u003ccode>FAILED\u003c/code> means one broke,\u003c/b> and \u003ccode>assert_eq!\u003c/code> doesn&#39;t just say so. It shows you the exact values: \u003ccode>left\u003c/code> was \u003ccode>100\u003c/code>, \u003ccode>right\u003c/code> was \u003ccode>50\u003c/code>. The senior fee should have been \u003ccode>50\u003c/code>, so the function returned the wrong number.","\u003cb>The summary line\u003c/b> wraps it up: \u003ccode>2 passed; 1 failed\u003c/code>.","You know what broke, and what the wrong value was, before you even open the file."],"remember":"red shows the exact left and right values, so you debug before you open the code."},{"type":"quote","img":"","kicker":"Takeaway","title":"The big idea","notes":["The whole episode in one line:","Tests are not extra. They are the project. Write them, and you get to change your code and prove it still works, every time."],"composed":"\u003cdiv class=\"txt txt-quote\">\u003cdiv class=\"txt-kicker\">Takeaway\u003c/div>\u003cp class=\"txt-quote-text\">Tests are not extra. They are the project. Write them, and you get to change your code and prove it still works, every time.\u003c/p>\u003cp class=\"txt-lead\">The whole episode in one line:\u003c/p>\u003c/div>"},{"type":"cheatsheet","title":"Cheatsheet recap","notes":["Recap: one line per idea, in order. Good place to pause for questions.","\u003cb>Maps to:\u003c/b> The Rust Programming Language, Chapter 11.","\u003cb>Practice:\u003c/b> Rustlings \u003ccode>17_tests\u003c/code>."],"composed":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Why test at all?\u003c/td>\u003ctd>tests are the confidence to change code, not a chore on top of it.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Your first test\u003c/td>\u003ctd>a test is a plain function with #[test] on top, living in a cfg(test) module.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Pick the right assertion\u003c/td>\u003ctd>prefer assert_eq!, its failure message hands you the two values for free.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Test the panic\u003c/td>\u003ctd>#[should_panic(expected = ...)] tests that the unhappy path fails the right way.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Tests can return errors\u003c/td>\u003ctd>return Result from a test so ? can short-circuit a failure for you.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Two homes for tests\u003c/td>\u003ctd>unit tests see everything, integration tests see only your api.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Run the slice you need\u003c/td>\u003ctd>run the slice you need, not the whole suite every time.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Read the result\u003c/td>\u003ctd>red shows the exact left and right values, so you debug before you open the code.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>"}]};
  var SLIDES = DATA.slides;
  function stripT(s){ return (s || '').replace(/<[^>]+>/g, ''); }

  // ---- element refs ----
  var deck = document.getElementById('deck');
  var scaler = document.getElementById('scaler');
  var viewport = document.getElementById('viewport');
  var bar = document.getElementById('bar');
  var curEl = document.getElementById('cur');
  var totalEl = document.getElementById('total');
  var ctitle = document.getElementById('ctitle');
  var notes = document.getElementById('notes');
  var notesInner = document.getElementById('notesInner');
  var grid = document.getElementById('grid');
  var gridInner = document.getElementById('gridInner');
  var btnNotes = document.getElementById('btnNotes');
  var btnGrid = document.getElementById('btnGrid');
  var btnFull = document.getElementById('btnFull');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  var NOTES_KEY = 'rfz_slides_notes';
  var idx = 0;
  var notesOpen = false;
  try { notesOpen = localStorage.getItem(NOTES_KEY) === '1'; } catch(e){}

  totalEl.textContent = SLIDES.length;

  function bodyHTML(s){
    if (s.type === 'cover') return DATA.cover;
    if (s.type === 'cheatsheet') return s.composed || DATA.cheat;
    if (s.composed) return s.composed;
    return '<img class="full" src="' + s.img + '" alt="' + stripT(s.title) + '" />';
  }

  function notesHTML(s){
    var pts = (s.notes || []).map(function(n){ return '<li>' + n + '</li>'; }).join('');
    var html = '';
    if (s.kicker) html += '<div class="n-kicker">' + s.kicker + '</div>';
    html += '<h2 class="n-title">' + (s.title || '') + '</h2>';
    if (pts) html += '<ul class="n-points">' + pts + '</ul>';
    else html += '<p class="n-empty">No notes for this slide.</p>';
    if (s.remember) html += '<div class="n-remember"><span>Remember</span>' + s.remember + '</div>';
    return html;
  }

  function fit(){
    var availW = viewport.clientWidth;
    var availH = viewport.clientHeight;
    var scale = Math.min(availW / 1280, availH / 720) * 0.955;
    if (!isFinite(scale) || scale <= 0) scale = 0.1;
    deck.style.transform = 'scale(' + scale + ')';
    scaler.style.width = (1280 * scale) + 'px';
    scaler.style.height = (720 * scale) + 'px';
  }

  function render(){
    var s = SLIDES[idx];
    deck.innerHTML = bodyHTML(s);
    notesInner.innerHTML = notesHTML(s);
    curEl.textContent = (idx + 1);
    ctitle.innerHTML = s.title || '';
    bar.style.width = (((idx + 1) / SLIDES.length) * 100) + '%';
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === SLIDES.length - 1);
    var hash = '#' + (idx + 1);
    if (location.hash !== hash) {
      try { history.replaceState(null, '', hash); } catch(e){ location.hash = hash; }
    }
    updateGridCurrent();
    fit();
  }

  function go(n){
    var t = Math.max(0, Math.min(SLIDES.length - 1, n));
    if (t === idx) return;
    idx = t;
    render();
  }
  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  function setNotes(open){
    notesOpen = open;
    notes.classList.toggle('open', open);
    btnNotes.classList.toggle('on', open);
    try { localStorage.setItem(NOTES_KEY, open ? '1' : '0'); } catch(e){}
    setTimeout(fit, 200);
  }
  function toggleNotes(){ setNotes(!notesOpen); }

  function setGrid(open){
    grid.classList.toggle('open', open);
    btnGrid.classList.toggle('on', open);
    if (open) updateGridCurrent();
  }
  function toggleGrid(){ setGrid(!grid.classList.contains('open')); }

  function updateGridCurrent(){
    var kids = gridInner.children;
    for (var i = 0; i < kids.length; i++){
      kids[i].classList.toggle('current', i === idx);
    }
  }

  function buildGrid(){
    var html = '';
    for (var i = 0; i < SLIDES.length; i++){
      var s = SLIDES[i];
      var inner;
      if (s.type === 'cover') inner = '<div class="composed"><div class="big">' + DATA.coverBig + '</div></div>';
      else if (s.type === 'cheatsheet') inner = '<div class="composed"><div class="big">Cheatsheet <span class="accent">recap</span></div></div>';
      else if (s.composed) inner = '<div class="composed"><div class="big">' + (s.title || '') + '</div></div>';
      else inner = '<img src="' + s.img + '" alt="" loading="lazy" />';
      html += '<div class="thumb" data-i="' + i + '" title="' + stripT(s.title) + '">' + inner + '<span class="num">' + (i + 1) + '</span></div>';
    }
    gridInner.innerHTML = html;
  }

  function toggleFull(){
    var el = document.documentElement;
    if (!document.fullscreenElement){
      (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }

  // ---- events ----
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  btnNotes.addEventListener('click', toggleNotes);
  btnGrid.addEventListener('click', toggleGrid);
  btnFull.addEventListener('click', toggleFull);
  document.getElementById('gridClose').addEventListener('click', function(){ setGrid(false); });

  deck.addEventListener('click', next);

  gridInner.addEventListener('click', function(e){
    var t = e.target.closest('.thumb');
    if (!t) return;
    go(parseInt(t.getAttribute('data-i'), 10));
    setGrid(false);
  });

  document.addEventListener('keydown', function(e){
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key;
    if (k === 'ArrowRight' || k === 'PageDown' || k === ' ' || k === 'Spacebar'){ e.preventDefault(); next(); }
    else if (k === 'ArrowLeft' || k === 'PageUp'){ e.preventDefault(); prev(); }
    else if (k === 'Home'){ e.preventDefault(); go(0); }
    else if (k === 'End'){ e.preventDefault(); go(SLIDES.length - 1); }
    else if (k === 'n' || k === 'N'){ toggleNotes(); }
    else if (k === 'g' || k === 'G'){ toggleGrid(); }
    else if (k === 'f' || k === 'F'){ toggleFull(); }
    else if (k === 'Escape'){ if (grid.classList.contains('open')) setGrid(false); }
  });

  // basic swipe
  var sx = null;
  viewport.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
  viewport.addEventListener('touchend', function(e){
    if (sx === null) return;
    var dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    sx = null;
  }, {passive:true});

  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', function(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n) && (n - 1) !== idx) go(n - 1);
  });

  // ---- init ----
  (function start(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n)) idx = Math.max(0, Math.min(SLIDES.length - 1, n - 1));
    buildGrid();
    setNotes(notesOpen);
    render();
  })();
})();
</script>
</body>
</html>
