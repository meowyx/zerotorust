<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
:root{
  --ink:#1c1e22; --soft:#43474e; --muted:#888d96; --line:#e3e4e8;
  --rust:#c8542a; --code-bg:#f5f5f4;
  --sans:"Bricolage Grotesque",system-ui,-apple-system,sans-serif;
  --serif:"Instrument Serif",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --stage:#0e0f12; --panel:#16181d; --sline:#26282e; --sink:#e8e6e2; --smuted:#9a9aaa;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--stage);color:var(--sink);font-family:var(--sans);overflow:hidden;}
button{font-family:inherit;}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.progress{flex:none;height:3px;background:#1d1f24;}
.progress > i{display:block;height:100%;background:var(--rust);width:0;transition:width .25s ease;}

.topbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--sink);}
.brand svg{display:block;}
.brand .sep{color:#4a4d55;font-weight:400;}
.brand .ep{font-family:var(--mono);color:var(--rust);font-weight:700;letter-spacing:.08em;}
.hint{font-family:var(--mono);font-size:11px;color:#6b6e76;white-space:nowrap;}
.hint b{color:#9a9aaa;font-weight:700;}

.middle{flex:1;display:flex;min-height:0;min-width:0;}
.viewport{flex:1;display:grid;place-items:center;min-width:0;min-height:0;position:relative;overflow:hidden;}

/* sized in JS to the scaled deck size so grid centering uses the real footprint */
.scaler{position:relative;flex:none;}
.deck{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left;border-radius:14px;overflow:hidden;background:#fff;
  box-shadow:0 30px 90px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.05);cursor:pointer;}
.deck img.full{display:block;width:100%;height:100%;object-fit:contain;background:#fff;}

/* composed: cover */
.cv{width:100%;height:100%;padding:78px 86px;display:flex;flex-direction:column;justify-content:center;position:relative;color:var(--ink);}
.cv-eyebrow{font-family:var(--mono);font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.cv-title{font-size:96px;line-height:1.04;font-weight:800;color:#16181d;margin:18px 0 0;letter-spacing:-0.01em;}
.cv-title .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.cv-tag{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--soft);margin:26px 0 0;max-width:760px;line-height:1.32;}
.cv-chip{margin-top:40px;align-self:flex-start;font-family:var(--mono);font-size:16px;color:var(--soft);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:8px;}
.cv-foot{position:absolute;left:86px;right:86px;bottom:54px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);padding-top:18px;font-size:15px;color:var(--muted);}
.cv-foot .ep{font-family:var(--mono);font-weight:700;color:var(--rust);letter-spacing:.12em;}
.cv-num{position:absolute;top:54px;right:86px;font-family:var(--mono);font-weight:800;font-size:120px;color:#e6e7ec;line-height:1;}

/* composed: cheatsheet */
.ck{width:100%;height:100%;padding:56px 70px;display:flex;flex-direction:column;color:var(--ink);}
.ck h2{font-size:48px;font-weight:800;color:#16181d;margin:0 0 4px;letter-spacing:-0.01em;}
.ck h2 .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.ck .sub{font-size:17px;color:var(--soft);margin:0 0 18px;}
.ck table{width:100%;border-collapse:collapse;font-size:16.5px;}
.ck th{text-align:left;background:#f3f3f4;color:var(--ink);font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;border:1px solid var(--line);}
.ck td{padding:7px 12px;border:1px solid var(--line);color:var(--soft);vertical-align:top;}
.ck td.idea{font-weight:700;color:#16181d;width:38%;}
.ck code{font-family:var(--mono);font-size:.9em;background:var(--code-bg);padding:.06em .3em;border-radius:4px;color:#9a3a18;}

/* notes drawer */
.notes{flex:none;width:0;overflow:hidden;background:var(--panel);border-left:1px solid var(--sline);transition:width .18s ease,height .18s ease;}
.notes.open{width:380px;}
.notes-inner{width:380px;height:100%;overflow:auto;padding:24px 24px 40px;}
.n-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b6e76;margin-bottom:8px;}
.n-title{font-size:23px;font-weight:800;color:var(--sink);margin:0 0 14px;letter-spacing:-0.01em;}
.n-points{margin:0;padding-left:18px;}
.n-points li{font-size:14.5px;line-height:1.6;color:#c4c4cc;margin:0 0 9px;}
.n-points li b{color:#fff;font-weight:700;}
.notes-inner code{font-family:var(--mono);font-size:.86em;background:#22252b;padding:.08em .34em;border-radius:4px;color:#e7a884;}
.n-remember{margin-top:18px;border-left:3px solid var(--rust);background:rgba(200,84,42,.10);border-radius:0 8px 8px 0;padding:12px 14px;font-size:14.5px;line-height:1.55;color:#f0e6df;}
.n-remember span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rust);font-weight:700;margin-bottom:5px;}
.n-empty{color:#6b6e76;font-size:14px;font-style:italic;}

/* bottom controls */
.controls{flex:none;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--sline);background:#101216;}
.controls .counter{font-family:var(--mono);font-size:13px;color:var(--smuted);min-width:66px;}
.controls .counter b{color:var(--sink);}
.controls .ctitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:#c4c4cc;}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--sline);background:#1a1c22;color:var(--sink);
  font-size:13px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;transition:background .14s,border-color .14s,color .14s;}
.btn:hover{background:#23262d;border-color:#3a3d45;}
.btn:disabled{opacity:.38;cursor:not-allowed;}
.btn.icon{padding:8px 12px;font-size:17px;line-height:1;}
.btn.on{background:rgba(200,84,42,.16);border-color:rgba(200,84,42,.55);color:#f0b69e;}
.btn .k{font-family:var(--mono);font-size:10px;color:#7e818a;}

/* grid overview */
.grid{position:fixed;inset:0;z-index:80;background:rgba(8,9,11,.97);overflow:auto;padding:36px 40px 56px;display:none;}
.grid.open{display:block;}
.grid-head{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto 22px;}
.grid-head h2{font-size:20px;margin:0;color:var(--sink);font-weight:800;}
.grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;max-width:1320px;margin:0 auto;}
.thumb{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;border:1px solid var(--sline);background:#fff;cursor:pointer;transition:transform .12s,outline-color .12s;outline:2px solid transparent;}
.thumb:hover{transform:translateY(-2px);}
.thumb.current{outline-color:var(--rust);}
.thumb img{width:100%;height:100%;object-fit:contain;}
.thumb .composed{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink);padding:10px;text-align:center;}
.thumb .composed .big{font-size:22px;font-weight:800;color:#16181d;}
.thumb .composed .big .accent{font-family:var(--serif);font-style:italic;color:var(--rust);font-weight:400;}
.thumb .num{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:rgba(14,15,18,.78);border-radius:5px;padding:2px 6px;}

@media (max-width:760px){
  .hint{display:none;}
  .controls .ctitle{display:none;}
  .controls{flex-wrap:wrap;gap:8px;padding:8px 10px;}
  .btn{padding:9px 12px;}
  .btn .k{display:none;}            /* no keyboard on touch */
  #btnFull{display:none;}           /* fullscreen is niche on phones, unsupported on iOS */
  /* stack the slide on top and slide notes up from the bottom, so the
     control bar stays reachable instead of being covered by an overlay */
  .middle{flex-direction:column;}
  .notes{width:auto;height:0;border-left:none;border-top:1px solid var(--sline);}
  .notes.open{width:auto;height:46vh;}
  .notes-inner{width:auto;}
}
</style>
</head>

(function(){
  "use strict";

  var DATA = {"ep":"04","title":"Vec, String, and HashMap","cover":"\u003cdiv class=\"cv\">\u003cdiv class=\"cv-eyebrow\">MeowyTheDev · Rust from Zero\u003c/div>\u003ch1 class=\"cv-title\">Vec, String, and \u003cspan class=\"accent\">HashMap\u003c/span>\u003c/h1>\u003cp class=\"cv-tag\">three collections cover almost everything. growable, on the heap, owned by you.\u003c/p>\u003cdiv class=\"cv-chip\">The Rust Programming Language \u003cspan class=\"dot\">·\u003c/span> Chapter 8\u003c/div>\u003cdiv class=\"cv-foot\">\u003cspan class=\"ep\">EP.04\u003c/span>\u003cspan>companion slides · watch on the Rust from Zero playlist\u003c/span>\u003c/div>\u003cdiv class=\"cv-num\">04\u003c/div>\u003c/div>","coverBig":"Vec, String, and \u003cspan class=\"accent\">HashMap\u003c/span>","cheat":"\u003cdiv class=\"ck\">\u003ch2>Cheatsheet \u003cspan class=\"accent\">recap\u003c/span>\u003c/h2>\u003cp class=\"sub\">One line per idea, in order. The pause-for-questions slide.\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>Idea\u003c/th>\u003cth>Remember\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"idea\">Three collections\u003c/td>\u003ctd>same rules. new shapes.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Why a Vec?\u003c/td>\u003ctd>list. heap. owned.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Making a Vec\u003c/td>\u003ctd>macro for known values. \u003ccode>new\u003c/code> for empty. capacity for big.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Changing a Vec\u003c/td>\u003ctd>push, pop, insert. always an Option on pop.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Reading a Vec\u003c/td>\u003ctd>\u003ccode>.get\u003c/code> for safe. \u003ccode>&amp;\u003c/code> to iterate. len isn't capacity.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">&amp;str vs String\u003c/td>\u003ctd>literal: \u003ccode>&amp;str\u003c/code>. runtime text: \u003ccode>String\u003c/code>. accept \u003ccode>&amp;str\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Strings are UTF-8 bytes\u003c/td>\u003ctd>english fits one byte. one cat does not.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Why s[0] doesn't compile\u003c/td>\u003ctd>ask for chars or bytes. never \u003ccode>s[0]\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Building strings\u003c/td>\u003ctd>\u003ccode>+\u003c/code> moves the left. \u003ccode>format!\u003c/code> borrows.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Why a HashMap?\u003c/td>\u003ctd>lookup by name. owned, like the rest.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Using a HashMap\u003c/td>\u003ctd>get returns an Option. order is arbitrary.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Who owns the keys?\u003c/td>\u003ctd>String moves. u32 copies. a \u003ccode>&amp;\u003c/code> must outlive the map.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">The check-then-insert mess\u003c/td>\u003ctd>two lookups. there's a better way.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">The entry API\u003c/td>\u003ctd>one lookup. then decide.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Borrow while iterating\u003c/td>\u003ctd>same borrow rule. new shape.\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"idea\">Read all, then write all\u003c/td>\u003ctd>read all. then write all.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","slides":[{"type":"cover","title":"Vec, String, and HashMap","notes":["\u003cb>Episode 4.\u003c/b> three collections cover almost everything. growable, on the heap, owned by you.","\u003cb>Covers:\u003c/b> The Rust Programming Language · Chapter 8"]},{"type":"image","img":"img/SceneThreeCollections.webp","kicker":"Book · Ch 8 (intro)","title":"Three collections","notes":["Three collection types cover almost everything you&#39;ll reach for. All three grow, all three live on the heap, and all three are owned by you, the same ownership rules from episode 2.","\u003cb>\u003ccode>Vec&lt;T&gt;\u003c/code>\u003c/b> is an ordered list.","\u003cb>\u003ccode>String\u003c/code>\u003c/b> is owned text.","\u003cb>\u003ccode>HashMap&lt;K, V&gt;\u003c/code>\u003c/b> pairs a key with a value.","Different shapes, same rules."],"remember":"same rules. new shapes."},{"type":"divider","img":"img/SceneChapter01.webp","kicker":"Chapter · Book · §8.1","title":"Vec\u003cT>","notes":["Chapter break: \u003cb>Vec\u003cT>\u003c/b>.","The container you reach for daily: an ordered, growable list of one type."]},{"type":"image","img":"img/SceneVecWhy.webp","kicker":"Book · §8.1 Vectors","title":"Why a Vec?","notes":["\u003cb>Grows.\u003c/b> An ordered list of one type that resizes itself. An array can&#39;t.","\u003cb>Heap.\u003c/b> The buffer lives on the heap. That&#39;s what lets it grow while the program runs.","\u003cb>Owned.\u003c/b> It drops its items when it drops. The ownership rules from before still apply."],"remember":"list. heap. owned."},{"type":"image","img":"img/SceneVecCreate.webp","kicker":"Book · §8.1 Vectors","title":"Making a Vec","notes":["\u003cb>\u003ccode>vec!\u003c/code>\u003c/b> is the macro. Start with values inside, the type is inferred.","\u003cb>\u003ccode>Vec::new\u003c/code>\u003c/b> makes an empty one. Give it a type, since there&#39;s nothing inside to infer from.","\u003cb>\u003ccode>Vec::with_capacity(100)\u003c/code>\u003c/b> reserves room for 100 before the next resize, zero items yet. Use it when you know roughly how many are coming."],"remember":"macro for known values. \u003ccode>new\u003c/code> for empty. capacity for big."},{"type":"image","img":"img/SceneVecMutate.webp","kicker":"Book · §8.1 Vectors","title":"Changing a Vec","notes":["\u003cb>\u003ccode>push\u003c/code>\u003c/b> adds to the end, growing if it has to.","\u003cb>\u003ccode>pop\u003c/code>\u003c/b> returns an \u003ccode>Option\u003c/code>, because the Vec might be empty. \u003ccode>None\u003c/code> if empty, \u003ccode>Some(value)\u003c/code> otherwise.","\u003cb>\u003ccode>insert\u003c/code>\u003c/b> puts an item at any index. Items after it shift right; \u003ccode>remove\u003c/code> shifts left."],"remember":"push, pop, insert. always an Option on pop."},{"type":"image","img":"img/SceneVecRead.webp","kicker":"Book · §8.1 Vectors","title":"Reading a Vec","notes":["\u003cb>\u003ccode>[]\u003c/code>\u003c/b> panics on an out-of-range index. Fast path when you&#39;re sure.","\u003cb>\u003ccode>.get\u003c/code>\u003c/b> returns \u003ccode>Option&lt;&amp;T&gt;\u003c/code>: \u003ccode>None\u003c/code> when missing. Safer.","\u003cb>\u003ccode>for x in &amp;v\u003c/code>\u003c/b> borrows to read. Each \u003ccode>x\u003c/code> is a \u003ccode>&amp;T\u003c/code>, no move.","\u003cb>\u003ccode>len\u003c/code> vs \u003ccode>capacity\u003c/code>:\u003c/b> length is real items, capacity is room before the next resize."],"remember":"\u003ccode>.get\u003c/code> for safe. \u003ccode>&amp;\u003c/code> to iterate. len isn&#39;t capacity."},{"type":"divider","img":"img/SceneChapter02.webp","kicker":"Chapter · Book · §8.2","title":"String, really","notes":["Chapter break: \u003cb>String, really\u003c/b>.","Text is trickier than it looks. Bytes, chars, and graphemes are not the same thing."]},{"type":"image","img":"img/SceneStrVsString.webp","kicker":"Book · §8.2 Strings","title":"&amp;str vs String","notes":["\u003cb>\u003ccode>&amp;str\u003c/code>\u003c/b> is a borrowed view of text. Fixed size, cheap to pass.","\u003cb>\u003ccode>String\u003c/code>\u003c/b> is owned, on the heap, growable. You control its lifetime.","\u003cb>Accept \u003ccode>&amp;str\u003c/code>\u003c/b> in functions: it works for both literals and \u003ccode>String\u003c/code> references, one signature."],"remember":"literal: \u003ccode>&amp;str\u003c/code>. runtime text: \u003ccode>String\u003c/code>. accept \u003ccode>&amp;str\u003c/code>."},{"type":"image","img":"img/SceneStringUTF8.webp","kicker":"Book · §8.2 Strings","title":"Strings are UTF-8 bytes","notes":["Inside, a \u003ccode>String\u003c/code> is a list of bytes encoded as UTF-8. One character can take more than one byte. Take \u003ccode>&quot;Meowy 🐈&quot;\u003c/code>:","ASCII is one byte each. The cat is one character, but four bytes."],"remember":"english fits one byte. one cat does not."},{"type":"image","img":"img/SceneStringIndex.webp","kicker":"Book · §8.2 Strings","title":"Why s[0] doesn&#39;t compile","notes":["\u003cb>\u003ccode>s[0]\u003c/code>\u003c/b> asks &quot;which byte?&quot; and Rust refuses. A compile error, not a runtime panic.","\u003cb>\u003ccode>.chars()\u003c/code>\u003c/b> gives an iterator of \u003ccode>char\u003c/code>. \u003ccode>.nth(0)\u003c/code> returns the first.","\u003cb>\u003ccode>.bytes()\u003c/code>\u003c/b> gives the bytes instead.","\u003cb>\u003ccode>&amp;s[0..n]\u003c/code>\u003c/b> slices by bytes, and panics if the range cuts a character in half. Stay on char boundaries."],"remember":"ask for chars or bytes. never \u003ccode>s[0]\u003c/code>."},{"type":"image","img":"img/SceneStringOps.webp","kicker":"Book · §8.2 Strings","title":"Building strings","notes":["\u003cb>\u003ccode>push_str\u003c/code>\u003c/b> adds a \u003ccode>&amp;str\u003c/code> to the end. \u003ccode>push\u003c/code> adds a single \u003ccode>char\u003c/code>.","\u003cb>\u003ccode>+\u003c/code>\u003c/b> concatenates, but takes the left side by value. The left is gone after.","\u003cb>\u003ccode>format!\u003c/code>\u003c/b> does the same and borrows everything, returning a new \u003ccode>String\u003c/code>. No moves. Reach for it when you can."],"remember":"\u003ccode>+\u003c/code> moves the left. \u003ccode>format!\u003c/code> borrows."},{"type":"divider","img":"img/SceneChapter03.webp","kicker":"Chapter · Book · §8.3","title":"HashMap","notes":["Chapter break: \u003cb>HashMap\u003c/b>.","Look something up by key, not by position."]},{"type":"image","img":"img/SceneHashMapWhy.webp","kicker":"Book · §8.3 Hash Maps","title":"Why a HashMap?","notes":["A \u003ccode>HashMap\u003c/code> is a key, a value, and a way to look it up by name:","\u003cb>Key to value.\u003c/b> Point a name at a value, with constant-time lookup.","\u003cb>vs Vec.\u003c/b> A Vec answers &quot;what&#39;s at position 3?&quot; A HashMap answers &quot;what&#39;s at meowy?&quot;","\u003cb>Owned.\u003c/b> Every key and value lives inside the map. It drops them with it."],"remember":"lookup by name. owned, like the rest."},{"type":"image","img":"img/SceneHashMapBasics.webp","kicker":"Book · §8.3 Hash Maps","title":"Using a HashMap","notes":["\u003cb>\u003ccode>new\u003c/code>\u003c/b> makes an empty map. \u003ccode>K\u003c/code> and \u003ccode>V\u003c/code> are inferred from the first insert.","\u003cb>\u003ccode>insert\u003c/code>\u003c/b> pairs a key with a value. The same key replaces, returning the old value as an \u003ccode>Option\u003c/code>.","\u003cb>\u003ccode>get\u003c/code>\u003c/b> returns \u003ccode>Option&lt;&amp;V&gt;\u003c/code>, because the key might not be there. You unwrap or match.","\u003cb>\u003ccode>for (k, v) in &amp;map\u003c/code>\u003c/b> borrows to read all. The order is not stable, don&#39;t rely on it."],"remember":"get returns an Option. order is arbitrary."},{"type":"image","img":"img/SceneHashMapOwn.webp","kicker":"Book · §8.3 Hash Maps","title":"Who owns the keys?","notes":["\u003cb>String keys move\u003c/b> into the map. You can&#39;t use \u003ccode>name\u003c/code> after the insert.","\u003cb>Copy keys\u003c/b> (\u003ccode>u32\u003c/code>, \u003ccode>bool\u003c/code>, \u003ccode>char\u003c/code>...) are duplicated, not moved. You can still use them.","\u003cb>Reference keys\u003c/b> (\u003ccode>&amp;str\u003c/code>) work if the data outlives the map. Lifetimes still apply."],"remember":"String moves. u32 copies. a \u003ccode>&amp;\u003c/code> must outlive the map."},{"type":"image","img":"img/SceneEntryProblem.webp","kicker":"Book · §8.3 Hash Maps","title":"The check-then-insert mess","notes":["Counting words the obvious way takes two lookups on every hit:","\u003cb>\u003ccode>contains_key\u003c/code>\u003c/b> asks first, a boolean answer.","\u003cb>\u003ccode>get_mut\u003c/code> + \u003ccode>unwrap\u003c/code>\u003c/b> is the second lookup. That \u003ccode>unwrap\u003c/code> is a smell, not a feature.","The \u003ccode>else: insert\u003c/code> is a third branch. Two lookups on the hot path, for one update."],"remember":"two lookups. there&#39;s a better way."},{"type":"image","img":"img/SceneEntryAPI.webp","kicker":"Book · §8.3 Hash Maps","title":"The entry API","notes":["\u003cb>\u003ccode>.entry(k)\u003c/code>\u003c/b> does a single lookup and hands you the slot, whether it exists or not.","\u003cb>\u003ccode>.or_insert(v)\u003c/code>\u003c/b> drops in a default if missing, and returns \u003ccode>&amp;mut V\u003c/code> either way. Dereference and add.","\u003cb>\u003ccode>.and_modify(f)\u003c/code>\u003c/b> runs only if the key is present. Pair it with \u003ccode>.or_insert\u003c/code> for both cases.","\u003cb>\u003ccode>.or_insert_with(f)\u003c/code>\u003c/b> computes the default lazily, only on a miss."],"remember":"one lookup. then decide."},{"type":"divider","img":"img/SceneChapter04.webp","kicker":"Chapter · Book · Ch 8","title":"Common pitfalls","notes":["Chapter break: \u003cb>Common pitfalls\u003c/b>.","The mistakes everyone makes once."]},{"type":"image","img":"img/SceneBorrowWhileIter.webp","kicker":"Book · Ch 8 (pitfalls)","title":"Borrow while iterating","notes":["Iterating with \u003ccode>&amp;v\u003c/code> hands the loop a shared borrow until it finishes. \u003ccode>push\u003c/code> needs a mutable borrow. You can&#39;t have both at once:","Same rule from episode 2. New shape, same compiler answer."],"remember":"same borrow rule. new shape."},{"type":"image","img":"img/SceneBorrowFix.webp","kicker":"Book · Ch 8 (pitfalls)","title":"Read all, then write all","notes":["\u003cb>\u003ccode>collect\u003c/code>\u003c/b> is the read pass: produce the new items in a fresh Vec while you&#39;re only reading.","\u003cb>\u003ccode>extend\u003c/code>\u003c/b> is the write pass: mutate \u003ccode>v\u003c/code> once nothing is borrowing it.","\u003cb>\u003ccode>.clone()\u003c/code> trap:\u003c/b> cheap to type, not cheap to run. Reach for it on purpose, not by reflex."],"remember":"read all. then write all."},{"type":"quote","img":"img/ScenePullQuote.webp","kicker":"Takeaway","title":"The big idea","notes":["The whole episode in one line:","Store many things. Reach for one. Vec, String, HashMap."]},{"type":"cheatsheet","title":"Cheatsheet recap","notes":["Recap: one line per idea, in order. Good place to pause for questions.","\u003cb>Maps to:\u003c/b> The Rust Programming Language, Chapter 8.","\u003cb>Practice:\u003c/b> Rustlings \u003ccode>05_vecs\u003c/code>, \u003ccode>09_strings\u003c/code>, \u003ccode>11_hashmaps\u003c/code>."]}]};
  var SLIDES = DATA.slides;
  function stripT(s){ return (s || '').replace(/<[^>]+>/g, ''); }

  // ---- element refs ----
  var deck = document.getElementById('deck');
  var scaler = document.getElementById('scaler');
  var viewport = document.getElementById('viewport');
  var bar = document.getElementById('bar');
  var curEl = document.getElementById('cur');
  var totalEl = document.getElementById('total');
  var ctitle = document.getElementById('ctitle');
  var notes = document.getElementById('notes');
  var notesInner = document.getElementById('notesInner');
  var grid = document.getElementById('grid');
  var gridInner = document.getElementById('gridInner');
  var btnNotes = document.getElementById('btnNotes');
  var btnGrid = document.getElementById('btnGrid');
  var btnFull = document.getElementById('btnFull');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  var NOTES_KEY = 'rfz_slides_notes';
  var idx = 0;
  var notesOpen = false;
  try { notesOpen = localStorage.getItem(NOTES_KEY) === '1'; } catch(e){}

  totalEl.textContent = SLIDES.length;

  function bodyHTML(s){
    if (s.type === 'cover') return DATA.cover;
    if (s.type === 'cheatsheet') return DATA.cheat;
    return '<img class="full" src="' + s.img + '" alt="' + stripT(s.title) + '" />';
  }

  function notesHTML(s){
    var pts = (s.notes || []).map(function(n){ return '<li>' + n + '</li>'; }).join('');
    var html = '';
    if (s.kicker) html += '<div class="n-kicker">' + s.kicker + '</div>';
    html += '<h2 class="n-title">' + (s.title || '') + '</h2>';
    if (pts) html += '<ul class="n-points">' + pts + '</ul>';
    else html += '<p class="n-empty">No notes for this slide.</p>';
    if (s.remember) html += '<div class="n-remember"><span>Remember</span>' + s.remember + '</div>';
    return html;
  }

  function fit(){
    var availW = viewport.clientWidth;
    var availH = viewport.clientHeight;
    var scale = Math.min(availW / 1280, availH / 720) * 0.955;
    if (!isFinite(scale) || scale <= 0) scale = 0.1;
    deck.style.transform = 'scale(' + scale + ')';
    scaler.style.width = (1280 * scale) + 'px';
    scaler.style.height = (720 * scale) + 'px';
  }

  function render(){
    var s = SLIDES[idx];
    deck.innerHTML = bodyHTML(s);
    notesInner.innerHTML = notesHTML(s);
    curEl.textContent = (idx + 1);
    ctitle.innerHTML = s.title || '';
    bar.style.width = (((idx + 1) / SLIDES.length) * 100) + '%';
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === SLIDES.length - 1);
    var hash = '#' + (idx + 1);
    if (location.hash !== hash) {
      try { history.replaceState(null, '', hash); } catch(e){ location.hash = hash; }
    }
    updateGridCurrent();
    fit();
  }

  function go(n){
    var t = Math.max(0, Math.min(SLIDES.length - 1, n));
    if (t === idx) return;
    idx = t;
    render();
  }
  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  function setNotes(open){
    notesOpen = open;
    notes.classList.toggle('open', open);
    btnNotes.classList.toggle('on', open);
    try { localStorage.setItem(NOTES_KEY, open ? '1' : '0'); } catch(e){}
    setTimeout(fit, 200);
  }
  function toggleNotes(){ setNotes(!notesOpen); }

  function setGrid(open){
    grid.classList.toggle('open', open);
    btnGrid.classList.toggle('on', open);
    if (open) updateGridCurrent();
  }
  function toggleGrid(){ setGrid(!grid.classList.contains('open')); }

  function updateGridCurrent(){
    var kids = gridInner.children;
    for (var i = 0; i < kids.length; i++){
      kids[i].classList.toggle('current', i === idx);
    }
  }

  function buildGrid(){
    var html = '';
    for (var i = 0; i < SLIDES.length; i++){
      var s = SLIDES[i];
      var inner;
      if (s.type === 'cover') inner = '<div class="composed"><div class="big">' + DATA.coverBig + '</div></div>';
      else if (s.type === 'cheatsheet') inner = '<div class="composed"><div class="big">Cheatsheet <span class="accent">recap</span></div></div>';
      else inner = '<img src="' + s.img + '" alt="" loading="lazy" />';
      html += '<div class="thumb" data-i="' + i + '" title="' + stripT(s.title) + '">' + inner + '<span class="num">' + (i + 1) + '</span></div>';
    }
    gridInner.innerHTML = html;
  }

  function toggleFull(){
    var el = document.documentElement;
    if (!document.fullscreenElement){
      (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }

  // ---- events ----
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  btnNotes.addEventListener('click', toggleNotes);
  btnGrid.addEventListener('click', toggleGrid);
  btnFull.addEventListener('click', toggleFull);
  document.getElementById('gridClose').addEventListener('click', function(){ setGrid(false); });

  deck.addEventListener('click', next);

  gridInner.addEventListener('click', function(e){
    var t = e.target.closest('.thumb');
    if (!t) return;
    go(parseInt(t.getAttribute('data-i'), 10));
    setGrid(false);
  });

  document.addEventListener('keydown', function(e){
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key;
    if (k === 'ArrowRight' || k === 'PageDown' || k === ' ' || k === 'Spacebar'){ e.preventDefault(); next(); }
    else if (k === 'ArrowLeft' || k === 'PageUp'){ e.preventDefault(); prev(); }
    else if (k === 'Home'){ e.preventDefault(); go(0); }
    else if (k === 'End'){ e.preventDefault(); go(SLIDES.length - 1); }
    else if (k === 'n' || k === 'N'){ toggleNotes(); }
    else if (k === 'g' || k === 'G'){ toggleGrid(); }
    else if (k === 'f' || k === 'F'){ toggleFull(); }
    else if (k === 'Escape'){ if (grid.classList.contains('open')) setGrid(false); }
  });

  // basic swipe
  var sx = null;
  viewport.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
  viewport.addEventListener('touchend', function(e){
    if (sx === null) return;
    var dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    sx = null;
  }, {passive:true});

  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', function(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n) && (n - 1) !== idx) go(n - 1);
  });

  // ---- init ----
  (function start(){
    var n = parseInt((location.hash || '').replace('#',''), 10);
    if (!isNaN(n)) idx = Math.max(0, Math.min(SLIDES.length - 1, n - 1));
    buildGrid();
    setNotes(notesOpen);
    render();
  })();
})();
</script>
</body>
</html>
